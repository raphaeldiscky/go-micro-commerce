# Courier entity
type Courier {
  courierId: String!
}

# Origin entity
type Origin {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Destination entity
type Destination {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Package entity
type Package {
  weightKg: Decimal!
  width: Decimal!
  height: Decimal!
  length: Decimal!
  unit: String!
}

# CheckoutSession entity
type CheckoutSession {
  id: UUID!
  idempotencyKey: UUID!
  customerId: UUID!
  courier: Courier!
  destination: Destination!
  origin: Origin!
  package: Package!
  status: CheckoutSessionStatus!
  paymentGateway: String
  currency: String!
  items: [CheckoutSessionItem!]!
  createdAt: Time!
  updatedAt: Time!
}

# CheckoutSessionItem entity
type CheckoutSessionItem {
  id: UUID!
  productId: UUID!
  productName: String!
  quantity: Int!
  unitPrice: Decimal!
}

# Input type for creating checkout session
input CreateCheckoutSessionInput {
  idempotencyKey: UUID!
  cartId: UUID!
}

# Input type for courier
input CourierInput {
  courierId: String!
}

# Input type for origin
input OriginInput {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Input type for destination
input DestinationInput {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Input type for package
input PackageInput {
  weightKg: Decimal!
  width: Decimal!
  height: Decimal!
  length: Decimal!
  unit: String!
}

# Input type for updating checkout session
input UpdateCheckoutSessionInput {
  courier: CourierInput
  destination: DestinationInput
  origin: OriginInput
  package: PackageInput
  paymentGateway: String
}

# Input type for placing order
input PlaceOrderInput {
  idempotencyKey: UUID!
}

extend type Query {
  # Get checkout session by ID
  getCheckoutSession(id: UUID!): CheckoutSession @requiresAuth
}

extend type Mutation {
  # Create checkout session from authenticated user's cart
  createCheckoutSession(input: CreateCheckoutSessionInput!): CheckoutSession!
    @requiresAuth

  # Update checkout session with address, carrier, or payment gateway
  updateCheckoutSession(
    sessionId: UUID!
    input: UpdateCheckoutSessionInput!
  ): CheckoutSession! @requiresAuth

  # Place order from checkout session
  placeOrder(sessionId: UUID!, input: PlaceOrderInput!): CheckoutSession!
    @requiresAuth

  # Cancel checkout session
  cancelCheckoutSession(sessionId: UUID!): CheckoutSession! @requiresAuth
}
