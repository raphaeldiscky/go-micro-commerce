version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/infrastructure/db/queries"
    schema: "./migrations"
    gen:
      go:
        package: "sqlc"
        out: "./internal/infrastructure/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - column: "*.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "*.seller_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "*.created_at"
            go_type: "time.Time"
          - column: "*.updated_at"
            go_type: "time.Time"
          - column: "*.deleted_at"
            go_type:
              type: "time.Time"
              pointer: true
