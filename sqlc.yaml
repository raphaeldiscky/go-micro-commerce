version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/infra/db/query"
    schema: "./internal/infra/db/migration"
    gen:
      go:
        package: "sqlc"
        out: "./internal/infra/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
