# CloudNativePG Cluster Helm Values - Product Service (Local Development)
fullnameOverride: "product-pg"

type: postgresql
mode: standalone

version:
  postgresql: "18"

cluster:
  instances: 1  # Single instance for local dev

  affinity:
    nodeSelector:
      workload-type: stateful
    tolerations:
      - key: workload-type
        operator: Equal
        value: stateful
        effect: NoSchedule

  initdb:
    database: product_db
    owner: product_user

  storage:
    size: "5Gi"
    storageClass: "standard"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      work_mem: "4MB"
      log_statement: "ddl"
    pg_hba:
      - "host all all all scram-sha-256"

  monitoring:
    enabled: true
    disableDefaultQueries: false  # Keep built-in PostgreSQL metrics

    customQueries:
      - name: "table_sizes"
        query: |
          SELECT
            schemaname,
            tablename,
            pg_total_relation_size(schemaname||'.'||tablename) AS size_bytes
          FROM pg_tables
          WHERE schemaname = 'public'
        metrics:
          - schemaname:
              usage: "LABEL"
              description: "Schema name"
          - tablename:
              usage: "LABEL"
              description: "Table name"
          - size_bytes:
              usage: "GAUGE"
              description: "Total size of table including indexes in bytes"

      - name: "connection_stats"
        query: |
          SELECT
            datname,
            usename,
            application_name,
            state,
            COUNT(*) as count
          FROM pg_stat_activity
          WHERE datname IS NOT NULL
          GROUP BY datname, usename, application_name, state
        metrics:
          - datname:
              usage: "LABEL"
              description: "Database name"
          - usename:
              usage: "LABEL"
              description: "User name"
          - application_name:
              usage: "LABEL"
              description: "Application name"
          - state:
              usage: "LABEL"
              description: "Connection state"
          - count:
              usage: "GAUGE"
              description: "Number of connections"

    podMonitor:
      enabled: true
      metricRelabelings:
        - sourceLabels: [cluster_name]
          targetLabel: service
          replacement: "product"
        - sourceLabels: [namespace]
          targetLabel: k8s_namespace

backups:
  enabled: false  # Disabled for local development
