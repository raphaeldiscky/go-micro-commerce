# Redis Cluster Helm Chart Values for Local Development
# Chart: bitnami/redis-cluster
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/redis-cluster

# Redis Cluster configuration matching Docker Compose setup
# 6 nodes: 3 masters + 3 replicas (REDIS_CLUSTER_REPLICAS=1)

global:
  redis:
    password: "supersecret"

cluster:
  nodes: 6
  replicas: 1 # 1 replica per master = 3 masters + 3 replicas

# Redis image configuration
image:
  registry: docker.io
  repository: bitnami/redis-cluster
  tag: 8.2.1

# Resource configuration per node
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

# Persistence configuration
persistence:
  enabled: true
  storageClass: "standard"
  size: 2Gi

# Redis configuration
redis:
  # Cluster-specific configuration
  configmap: |-
    # Cluster settings
    cluster-enabled yes
    cluster-require-full-coverage no
    cluster-node-timeout 15000
    cluster-migration-barrier 1

    # Memory management
    maxmemory-policy allkeys-lru
    save ""

    # Network settings
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

# Service configuration
service:
  type: ClusterIP
  ports:
    redis: 6379

# Headless service for cluster communication
headless:
  service:
    type: ClusterIP

# Metrics for Prometheus
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Network policy (disabled for local dev)
networkPolicy:
  enabled: false

# Pod security context
podSecurityContext:
  enabled: true
  fsGroup: 1001

# Container security context
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true

# Update strategy
updateStrategy:
  type: RollingUpdate

# Pod disruption budget (for production stability)
podDisruptionBudget:
  enabled: false # Disabled for local dev

# Init container to handle cluster initialization
initContainers: []

# Volume permissions
volumePermissions:
  enabled: true
