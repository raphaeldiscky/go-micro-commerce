# Kafka Helm Chart Values for Local Development
# Chart: bitnami/kafka
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/kafka

# Kafka KRaft mode (no Zookeeper) with 3 brokers matching Docker Compose setup

# KRaft mode configuration (Zookeeper-less)
kraft:
  enabled: true
  clusterId: "abcdefghijklmnopqrstuv" # Must match Docker Compose

# Broker configuration (set to 0 to use combined broker+controller nodes)
broker:
  replicaCount: 0

  # Resource configuration per broker
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Persistence
  persistence:
    enabled: true
    storageClass: "standard"
    size: 5Gi

  # Liveness and readiness probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

# Controller configuration (combined with broker in KRaft mode)
# controllerOnly: false means nodes act as both controller and broker (matching Docker Compose)
controller:
  replicaCount: 3 # 3 combined broker+controller nodes
  controllerOnly: false

# Kafka image configuration
image:
  registry: docker.io
  repository: bitnami/kafka
  tag: 4.0.0-debian-12-r10

# Listeners configuration
listeners:
  client:
    protocol: PLAINTEXT
    containerPort: 9092
    name: CLIENT
  controller:
    protocol: PLAINTEXT
    containerPort: 9093
    name: CONTROLLER
  interbroker:
    protocol: PLAINTEXT
    containerPort: 9094
    name: INTERNAL

advertisedListeners:
  client: CLIENT://:9092
  interbroker: INTERNAL://:9094

listenerSecurityProtocolMap: "CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"

# Kafka configuration
config: |-
  # Replication settings (matching Docker Compose)
  offsets.topic.replication.factor=3
  transaction.state.log.replication.factor=3
  transaction.state.log.min.isr=2
  default.replication.factor=3
  min.insync.replicas=2

  # Topic settings
  auto.create.topics.enable=true
  num.partitions=3

  # Consumer group settings
  group.initial.rebalance.delay.ms=0

  # Log retention
  log.retention.hours=168
  log.segment.bytes=1073741824
  log.retention.check.interval.ms=300000

  # Performance tuning for local dev
  num.network.threads=3
  num.io.threads=8
  socket.send.buffer.bytes=102400
  socket.receive.buffer.bytes=102400
  socket.request.max.bytes=104857600

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 9092
    controller: 9093
    interbroker: 9094

# Headless service for StatefulSet
headless:
  publishNotReadyAddresses: true

# Metrics for Prometheus
metrics:
  kafka:
    enabled: true
    serviceMonitor:
      enabled: true
  jmx:
    enabled: true
    serviceMonitor:
      enabled: true

# Volume permissions
volumePermissions:
  enabled: true

# Pod security context
podSecurityContext:
  enabled: true
  fsGroup: 1001

# Container security context
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true

# Network policy (disabled for local dev)
networkPolicy:
  enabled: false

# Update strategy
updateStrategy:
  type: RollingUpdate

# Pod disruption budget (disabled for local dev)
podDisruptionBudget:
  create: false

# Log persistence (disabled to reduce resource usage)
logPersistence:
  enabled: false
