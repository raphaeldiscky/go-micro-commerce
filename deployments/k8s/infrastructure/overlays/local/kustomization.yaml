apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces
  - ../../base/namespaces

  # Databases
  - postgres

  # Messaging
  - kafka

  # Cache
  - redis

  # Ingress Routes (Local)
  - ingress-routes

  # Monitoring Stack
  - monitoring

  # API Gateway (REST)
  - api-gateway

  # GraphQL Gateway (Apollo Router)
  - graphql

  # Mailer (MailHog for local dev)
  - mailer
