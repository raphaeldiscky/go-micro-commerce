apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
spec:
  gatewayClassName: traefik
  listeners:
    - name: https-api
      protocol: HTTPS
      port: 443
      hostname: "api.discky.com"
    - name: https-dashboard
      protocol: HTTPS
      port: 443
      hostname: "traefik.discky.com"
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.discky.com"
