apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: application

resources:
  - ../../../base/postgres

patches:
  - target:
      kind: Cluster
      group: postgresql.cnpg.io
      version: v1
    patch: |-
      - op: replace
        path: /spec/instances
        value: 1
      - op: replace
        path: /spec/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      - op: replace
        path: /spec/affinity
        value:
          nodeSelector:
            workload-type: stateful
          tolerations:
            - key: workload-type
              operator: Equal
              value: stateful
              effect: NoSchedule
