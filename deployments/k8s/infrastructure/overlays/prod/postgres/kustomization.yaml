apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: application

resources:
  - ../../../base/postgres

patches:
  - target:
      kind: Cluster
      group: postgresql.cnpg.io
      version: v1
    patch: |-
      - op: add
        path: /spec/instances
        value: 3
      - op: add
        path: /spec/storage
        value:
          size: 20Gi
          storageClass: standard
      - op: add
        path: /spec/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      - op: add
        path: /spec/affinity
        value:
          nodeSelector:
            workload-type: stateful
          tolerations:
            - key: workload-type
              operator: Equal
              value: stateful
              effect: NoSchedule
