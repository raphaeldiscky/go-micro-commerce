apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces
  - ../../base/namespaces

  # Databases
  - postgres

  # Messaging
  - kafka

  # Cache
  - redis

  # Ingress Controller
  - ingress-controller

  # Ingress Routes (Production TLS)
  - ingress-routes

  # Monitoring Stack
  - monitoring

  # Apollo GraphQL Router
  - apollo-router
