apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# Generate ConfigMap from committed supergraph schema file
# This is the GitOps-compliant approach:
# - Schema is composed in CI/CD
# - Committed to git as supergraph-schema.graphql
# - Kustomize generates ConfigMap from file
# - ArgoCD syncs the generated ConfigMap
configMapGenerator:
  - name: apollo-supergraph-schema
    files:
      - supergraph-schema.graphql
    options:
      disableNameSuffixHash: true

resources:
  - configmap-rhai.yaml
  # Note: Router configuration is inline in values.yaml (Helm chart)
  # Note: configmap-supergraph-schema is generated above via configMapGenerator

commonLabels:
  app.kubernetes.io/name: apollo-router
  app.kubernetes.io/component: graphql-gateway
  app.kubernetes.io/managed-by: argocd
