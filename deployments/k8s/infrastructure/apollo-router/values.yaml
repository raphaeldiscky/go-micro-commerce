# Apollo Router Helm Chart Values
# Chart: oci://ghcr.io/apollographql/helm-charts/router
# Docs: https://www.apollographql.com/docs/router/containerization/kubernetes

# Replica configuration
replicaCount: 2

# Router configuration
# Using inline configuration (Helm chart will generate /app/configuration.yaml)
# Supergraph schema and Rhai script loaded from ConfigMaps
router:
  args:
    - --hot-reload
    - --supergraph
    - /config/supergraph-schema.graphql

  configuration:
    supergraph:
      listen: 0.0.0.0:4000
      path: /
      introspection: true
      defer_support: true

    cors:
      allow_credentials: true
      methods:
        - GET
        - POST
        - OPTIONS
      policies:
        - origins:
            - http://localhost:3000
            - http://localhost:3001
            - http://localhost:8080
            - http://graphql.localhost
          match_origins:
            - "^http://localhost:[0-9]+$"
          allow_credentials: true
          allow_headers:
            - Content-Type
            - Authorization
            - X-User-ID
            - X-Email
            - X-Roles
            - X-Is-Active
            - apollographql-client-name
            - apollographql-client-version
          expose_headers:
            - X-Request-ID

    rhai:
      main: /config/main.rhai

    headers:
      all:
        request:
          - propagate:
              matching: ".*"
          - insert:
              name: "X-Forwarded-For"
              from_context: "apollo_client_ip"
      subgraphs:
        auth-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"
        chat-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"
        notification-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"
        order-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"
        cart-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"
        payment-service:
          request:
            - propagate:
                named: "authorization"
            - propagate:
                named: "cookie"
            - propagate:
                named: "X-User-ID"
            - propagate:
                named: "X-Email"
            - propagate:
                named: "X-Roles"
            - propagate:
                named: "X-Is-Active"
            - insert:
                name: "X-Gateway"
                value: "graphql-gateway"
            - insert:
                name: "X-Client-IP"
                from_context: "apollo_client_ip"
            - propagate:
                named: "user-agent"
                rename: "X-User-Agent"

    health_check:
      enabled: true
      listen: 0.0.0.0:4088
      path: /health

    traffic_shaping:
      router:
        timeout: 30s
        global_rate_limit:
          capacity: 1000
          interval: 1s
      all:
        deduplicate_query: true
        timeout: 20s

    include_subgraph_errors:
      all: true

# Image configuration
image:
  repository: ghcr.io/apollographql/router
  tag: v2.7.0
  pullPolicy: IfNotPresent

# Container ports - explicitly defined since using external ConfigMap
containerPorts:
  http: 4000
  health: 4088

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetport: http

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Health check probes
probes:
  readiness:
    initialDelaySeconds: 10
  liveness:
    initialDelaySeconds: 30

# Rolling update strategy
rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

# Environment variables
extraEnvVars:
  - name: APOLLO_ROUTER_LOG
    value: info
  - name: APOLLO_ELV2_LICENSE
    value: accept

# Extra volume mounts for ConfigMaps
# Mounted to /config/ directory
extraVolumeMounts:
  # Supergraph schema
  - name: supergraph-schema
    mountPath: /config/supergraph-schema.graphql
    subPath: supergraph-schema.graphql
    readOnly: true
  # Rhai script for Set-Cookie propagation
  - name: rhai-script
    mountPath: /config/main.rhai
    subPath: main.rhai
    readOnly: true

# Extra volumes from ConfigMaps
extraVolumes:
  - name: supergraph-schema
    configMap:
      name: apollo-supergraph-schema
  - name: rhai-script
    configMap:
      name: apollo-router-rhai

# Pod Disruption Budget
podDisruptionBudget:
  minAvailable: 1

# Deployment annotations
deploymentAnnotations: {}

# Extra labels for resources
extraLabels:
  app: graphql-gateway
  component: apollo-router
  layer: api-gateway

# Node affinity (spread across nodes)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - router
          topologyKey: kubernetes.io/hostname

# Tolerations
tolerations: []

# Node selector
nodeSelector: {}

# Termination grace period
terminationGracePeriodSeconds: 30

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Ingress configuration (disabled - using Traefik)
ingress:
  enabled: false

# Virtual service configuration (disabled - not using Istio)
virtualservice:
  enabled: false

# Service entry configuration (disabled - not using Istio)
serviceentry:
  enabled: false

# Managed federation (disabled - using self-hosted with ConfigMaps)
managedFederation:
  apiKey: ""
  graphRef: ""

# Supergraph file (using ConfigMap instead)
supergraphFile: ""
