---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-chat
  labels:
    app: postgresql-chat
    component: database
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    app: postgresql-chat

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-chat
  labels:
    app: postgresql-chat
    component: database
spec:
  serviceName: postgresql-chat
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-chat
  template:
    metadata:
      labels:
        app: postgresql-chat
        component: database
    spec:
      containers:
        - name: postgresql
          image: postgres:18-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "chat_db"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: postgresql-chat
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
