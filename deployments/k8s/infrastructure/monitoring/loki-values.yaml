# Loki Helm Chart Values
# Chart: grafana/loki v6.46.0
# Deployment mode: Monolithic (single binary) for local development

# Deployment mode - use single binary for local development
deploymentMode: SingleBinary

loki:
  # Storage bucket names (required even for filesystem storage)
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin

  # Loki configuration using structuredConfig (map-based)
  structuredConfig:
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_entries_limit_per_query: 5000
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 24
      retention_period: 168h

    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    query_range:
      align_queries_with_step: true
      cache_results: true

# SingleBinary configuration
singleBinary:
  replicas: 1

  persistence:
    enabled: true
    size: 5Gi
    storageClass: null

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

# Monitoring configuration
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

  serviceMonitor:
    enabled: true
    labels: {}

# Gateway configuration (nginx)
gateway:
  enabled: true
  replicas: 1

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Backend (read/write) components disabled for SingleBinary mode
backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# Test configuration
test:
  enabled: false

# Disable chunksCache, resultsCache, and lokiCanary for local development
chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false
