# kube-prometheus-stack Helm Chart Values
# Chart: prometheus-community/kube-prometheus-stack
# Includes: Prometheus, Grafana, Alertmanager, Node Exporter, Kube State Metrics

# Prometheus configuration
prometheus:
  enabled: true

  prometheusSpec:
    retention: 7d
    retentionSize: "10GB"

    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Service monitors - automatically discover services
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Additional scrape configs for custom metrics
    additionalScrapeConfigs: []

  service:
    type: ClusterIP
    port: 9090

# Grafana configuration
grafana:
  enabled: true

  adminPassword: "admin" # Change for production

  persistence:
    enabled: true
    size: 2Gi

  # Disable sidecar datasource auto-discovery to prevent conflicts with static datasources
  sidecar:
    datasources:
      enabled: false  # Disable auto-discovery, use static datasources instead
    dashboards:
      enabled: true   # Keep dashboard auto-discovery

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "300m"

  service:
    type: ClusterIP
    port: 80

  # Grafana data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
          isDefault: false
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          access: proxy
          isDefault: false

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: UTC

# Alertmanager configuration
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"

    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  service:
    type: ClusterIP
    port: 9093

# Node Exporter (collects host metrics)
nodeExporter:
  enabled: true

# Kube State Metrics (collects Kubernetes object metrics)
kubeStateMetrics:
  enabled: true

# Prometheus Operator
prometheusOperator:
  enabled: true

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Default rules for Kubernetes monitoring
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false # Disabled for local dev
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: false # Disabled for local dev
    kubeApiserverSlos: false # Disabled for local dev
    kubelet: true
    kubeProxy: false # Disabled for local dev
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: false # Disabled for local dev
    kubeScheduler: false # Disabled for local dev
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
