apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cnpg-alerts
  namespace: default
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: cloudnative-pg
      interval: 30s
      rules:
        # Cluster Health Alerts
        - alert: PostgreSQLClusterDown
          expr: cnpg_pg_stat_replication_streaming == 0
          for: 5m
          labels:
            severity: critical
            component: postgresql
          annotations:
            summary: "PostgreSQL cluster {{ $labels.service }} is down"
            description: "PostgreSQL cluster {{ $labels.service }} has been down for more than 5 minutes."

        - alert: PostgreSQLInstanceDown
          expr: up{job="cnpg-cluster"} == 0
          for: 2m
          labels:
            severity: critical
            component: postgresql
          annotations:
            summary: "PostgreSQL instance {{ $labels.instance }} is down"
            description: "PostgreSQL instance {{ $labels.instance }} for service {{ $labels.service }} has been down for more than 2 minutes."

        # Connection Alerts
        - alert: PostgreSQLHighConnectionUsage
          expr: |
            (
              sum(cnpg_pg_stat_database_numbackends{datname!="template0",datname!="template1"}) by (service, datname)
              /
              max(cnpg_pg_settings_max_connections) by (service, datname)
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} connection usage is high"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} is using {{ $value | humanizePercentage }} of max connections."

        - alert: PostgreSQLConnectionLimitReached
          expr: |
            (
              sum(cnpg_pg_stat_database_numbackends{datname!="template0",datname!="template1"}) by (service, datname)
              /
              max(cnpg_pg_settings_max_connections) by (service, datname)
            ) >= 0.95
          for: 1m
          labels:
            severity: critical
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} is near connection limit"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} is using {{ $value | humanizePercentage }} of max connections. Immediate action required."

        # Replication Alerts
        - alert: PostgreSQLReplicationLagHigh
          expr: cnpg_pg_replication_lag > 10485760
          for: 5m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} replication lag is high"
            description: "PostgreSQL cluster {{ $labels.service }} has replication lag of {{ $value | humanize1024 }}B (>10MB) for more than 5 minutes."

        - alert: PostgreSQLReplicationLagCritical
          expr: cnpg_pg_replication_lag > 104857600
          for: 2m
          labels:
            severity: critical
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} replication lag is critical"
            description: "PostgreSQL cluster {{ $labels.service }} has replication lag of {{ $value | humanize1024 }}B (>100MB). Data loss risk."

        # Performance Alerts
        - alert: PostgreSQLCacheHitRatioLow
          expr: |
            rate(cnpg_pg_stat_database_blks_hit{datname!="template0",datname!="template1"}[5m])
            /
            (
              rate(cnpg_pg_stat_database_blks_hit{datname!="template0",datname!="template1"}[5m])
              +
              rate(cnpg_pg_stat_database_blks_read{datname!="template0",datname!="template1"}[5m])
            ) < 0.9
          for: 10m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} cache hit ratio is low"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} has a cache hit ratio of {{ $value | humanizePercentage }} (<90%). Consider increasing shared_buffers."

        - alert: PostgreSQLHighDeadlockRate
          expr: rate(cnpg_pg_stat_database_deadlocks{datname!="template0",datname!="template1"}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} has high deadlock rate"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} is experiencing {{ $value }} deadlocks per second."

        - alert: PostgreSQLHighRollbackRate
          expr: |
            rate(cnpg_pg_stat_database_xact_rollback{datname!="template0",datname!="template1"}[5m])
            /
            (
              rate(cnpg_pg_stat_database_xact_commit{datname!="template0",datname!="template1"}[5m])
              +
              rate(cnpg_pg_stat_database_xact_rollback{datname!="template0",datname!="template1"}[5m])
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} has high rollback rate"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} has {{ $value | humanizePercentage }} transaction rollback rate."

        # Lock Alerts
        - alert: PostgreSQLTooManyLocks
          expr: sum(cnpg_pg_locks_count) by (service, datname) > 100
          for: 5m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} has too many locks"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} has {{ $value }} active locks."

        # Storage Alerts
        - alert: PostgreSQLTableSizeGrowthHigh
          expr: |
            (
              cnpg_table_sizes_size_bytes
              -
              cnpg_table_sizes_size_bytes offset 1h
            ) / cnpg_table_sizes_size_bytes offset 1h > 0.5
          for: 5m
          labels:
            severity: info
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} table {{ $labels.tablename }} growing rapidly"
            description: "Table {{ $labels.tablename }} in {{ $labels.service }} has grown by {{ $value | humanizePercentage }} in the last hour."

        # WAL Alerts
        - alert: PostgreSQLWALGenerationRateHigh
          expr: rate(cnpg_pg_wal_lsn_diff[5m]) > 10485760
          for: 10m
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} WAL generation rate is high"
            description: "PostgreSQL cluster {{ $labels.service }} is generating WAL at {{ $value | humanize1024 }}B/s (>10MB/s)."

        # Idle Connections Alert
        - alert: PostgreSQLTooManyIdleConnections
          expr: |
            sum(cnpg_connection_stats_count{state="idle"}) by (service, datname)
            /
            sum(cnpg_connection_stats_count) by (service, datname) > 0.5
          for: 10m
          labels:
            severity: info
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }}/{{ $labels.datname }} has many idle connections"
            description: "PostgreSQL database {{ $labels.service }}/{{ $labels.datname }} has {{ $value | humanizePercentage }} idle connections. Consider connection pooling."

        # Backup Alerts (for when backups are enabled)
        - alert: PostgreSQLBackupFailed
          expr: cnpg_pg_backup_last_backup_timestamp{status="failed"} > 0
          for: 5m
          labels:
            severity: critical
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} backup failed"
            description: "PostgreSQL cluster {{ $labels.service }} last backup failed."

        - alert: PostgreSQLBackupStale
          expr: time() - cnpg_pg_backup_last_backup_timestamp{status="success"} > 86400
          for: 1h
          labels:
            severity: warning
            component: postgresql
          annotations:
            summary: "PostgreSQL {{ $labels.service }} backup is stale"
            description: "PostgreSQL cluster {{ $labels.service }} has not had a successful backup in over 24 hours."
