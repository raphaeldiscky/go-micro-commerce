---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-ui-config
  labels:
    app: kafka-ui
    component: kafka-admin
data:
  KAFKA_CLUSTERS_0_NAME: "kafka-kraft-cluster"
  KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-cluster-kafka-bootstrap.application.svc.cluster.local:9092"
  DYNAMIC_CONFIG_ENABLED: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  labels:
    app: kafka-ui
    component: kafka-admin
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: kafka-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  labels:
    app: kafka-ui
    component: kafka-admin
    owner: raphaeldiscky
  annotations:
    email: raph.discky@gmail.com
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
        component: kafka-admin
    spec:
      serviceAccountName: kafka-ui
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      restartPolicy: Always
      nodeSelector:
        workload-type: monitoring
      tolerations:
        - key: workload-type
          operator: Equal
          value: monitoring
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: kafka-ui-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
