# CloudNativePG Cluster - Order Service (Base)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: order-pg
  labels:
    app: order-pg
    component: database
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  instances: 1
  bootstrap:
    initdb:
      database: order_db
      owner: order_user
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      work_mem: "4MB"
      log_statement: "ddl"
    pg_hba:
      - "host all all all scram-sha-256"
  monitoring:
    enabled: true
    disableDefaultQueries: false
    customQueries:
      - name: "table_sizes"
        query: |
          SELECT
            schemaname,
            tablename,
            pg_total_relation_size(schemaname||'.'||tablename) AS size_bytes
          FROM pg_tables
          WHERE schemaname = 'public'
        metrics:
          - schemaname:
              usage: "LABEL"
              description: "Schema name"
          - tablename:
              usage: "LABEL"
              description: "Table name"
          - size_bytes:
              usage: "GAUGE"
              description: "Total size of table including indexes in bytes"
      - name: "connection_stats"
        query: |
          SELECT
            datname,
            usename,
            application_name,
            state,
            COUNT(*) as count
          FROM pg_stat_activity
          WHERE datname IS NOT NULL
          GROUP BY datname, usename, application_name, state
        metrics:
          - datname:
              usage: "LABEL"
              description: "Database name"
          - usename:
              usage: "LABEL"
              description: "User name"
          - application_name:
              usage: "LABEL"
              description: "Application name"
          - state:
              usage: "LABEL"
              description: "Connection state"
          - count:
              usage: "GAUGE"
              description: "Number of connections"
    podMonitor:
      enabled: true
      metricRelabelings:
        - sourceLabels: [cluster_name]
          targetLabel: service
          replacement: "order"
        - sourceLabels: [namespace]
          targetLabel: k8s_namespace
