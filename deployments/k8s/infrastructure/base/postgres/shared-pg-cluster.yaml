apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-pg
  namespace: application
  labels:
    app: shared-pg
    component: database
spec:
  instances: 3 # High availability with 3 replicas
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: 40Gi # 40GB for all 8 databases (saves 120GB from 8x20GB)
    storageClass: standard

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Node affinity for stateful pool
  affinity:
    nodeSelector:
      workload-type: stateful
    tolerations:
      - key: workload-type
        operator: Equal
        value: stateful
        effect: NoSchedule

  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      postInitSQL:
        # Create 8 databases (one per microservice)
        - CREATE DATABASE auth_db;
        - CREATE DATABASE cart_db;
        - CREATE DATABASE order_db;
        - CREATE DATABASE product_db;
        - CREATE DATABASE payment_db;
        - CREATE DATABASE fulfillment_db;
        - CREATE DATABASE notification_db;
        - CREATE DATABASE chat_db;
      postInitApplicationSQL:
        # ============================================
        # DATABASE LEVEL PRIVILEGES
        # ============================================
        - GRANT ALL PRIVILEGES ON DATABASE auth_db TO auth_user;
        - ALTER DATABASE auth_db OWNER TO auth_user;
        - GRANT ALL PRIVILEGES ON DATABASE cart_db TO cart_user;
        - ALTER DATABASE cart_db OWNER TO cart_user;
        - GRANT ALL PRIVILEGES ON DATABASE order_db TO order_user;
        - ALTER DATABASE order_db OWNER TO order_user;
        - GRANT ALL PRIVILEGES ON DATABASE product_db TO product_user;
        - ALTER DATABASE product_db OWNER TO product_user;
        - GRANT ALL PRIVILEGES ON DATABASE payment_db TO payment_user;
        - ALTER DATABASE payment_db OWNER TO payment_user;
        - GRANT ALL PRIVILEGES ON DATABASE fulfillment_db TO fulfillment_user;
        - ALTER DATABASE fulfillment_db OWNER TO fulfillment_user;
        - GRANT ALL PRIVILEGES ON DATABASE notification_db TO notification_user;
        - ALTER DATABASE notification_db OWNER TO notification_user;
        - GRANT ALL PRIVILEGES ON DATABASE chat_db TO chat_user;
        - ALTER DATABASE chat_db OWNER TO chat_user;

        # ============================================
        # SCHEMA LEVEL PRIVILEGES (PostgreSQL 15+)
        # Required for migrations to create tables
        # ============================================

        # Auth Service Schema Permissions
        - \c auth_db;
        - GRANT USAGE ON SCHEMA public TO auth_user;
        - GRANT CREATE ON SCHEMA public TO auth_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO auth_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO auth_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO auth_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO auth_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO auth_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO auth_user;

        # Cart Service Schema Permissions
        - \c cart_db;
        - GRANT USAGE ON SCHEMA public TO cart_user;
        - GRANT CREATE ON SCHEMA public TO cart_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO cart_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO cart_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO cart_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO cart_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO cart_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO cart_user;

        # Chat Service Schema Permissions
        - \c chat_db;
        - GRANT USAGE ON SCHEMA public TO chat_user;
        - GRANT CREATE ON SCHEMA public TO chat_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO chat_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO chat_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO chat_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO chat_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO chat_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO chat_user;

        # Fulfillment Service Schema Permissions
        - \c fulfillment_db;
        - GRANT USAGE ON SCHEMA public TO fulfillment_user;
        - GRANT CREATE ON SCHEMA public TO fulfillment_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO fulfillment_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO fulfillment_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO fulfillment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO fulfillment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO fulfillment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO fulfillment_user;

        # Notification Service Schema Permissions
        - \c notification_db;
        - GRANT USAGE ON SCHEMA public TO notification_user;
        - GRANT CREATE ON SCHEMA public TO notification_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO notification_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO notification_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO notification_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO notification_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO notification_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO notification_user;

        # Order Service Schema Permissions
        - \c order_db;
        - GRANT USAGE ON SCHEMA public TO order_user;
        - GRANT CREATE ON SCHEMA public TO order_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO order_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO order_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO order_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO order_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO order_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO order_user;

        # Payment Service Schema Permissions
        - \c payment_db;
        - GRANT USAGE ON SCHEMA public TO payment_user;
        - GRANT CREATE ON SCHEMA public TO payment_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO payment_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO payment_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO payment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO payment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO payment_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO payment_user;

        # Product Service Schema Permissions
        - \c product_db;
        - GRANT USAGE ON SCHEMA public TO product_user;
        - GRANT CREATE ON SCHEMA public TO product_user;
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO product_user;
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO product_user;
        - GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO product_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON TABLES TO product_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON SEQUENCES TO product_user;
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL PRIVILEGES ON FUNCTIONS TO product_user;

  # Managed roles - users created with passwords from Kubernetes secrets
  # Secrets are synced from Google Secret Manager via ExternalSecrets Operator
  managed:
    roles:
      - name: auth_user
        ensure: present
        login: true
        passwordSecret:
          name: auth-pg-app
        connectionLimit: -1
      - name: cart_user
        ensure: present
        login: true
        passwordSecret:
          name: cart-pg-app
        connectionLimit: -1
      - name: chat_user
        ensure: present
        login: true
        passwordSecret:
          name: chat-pg-app
        connectionLimit: -1
      - name: fulfillment_user
        ensure: present
        login: true
        passwordSecret:
          name: fulfillment-pg-app
        connectionLimit: -1
      - name: notification_user
        ensure: present
        login: true
        passwordSecret:
          name: notification-pg-app
        connectionLimit: -1
      - name: order_user
        ensure: present
        login: true
        passwordSecret:
          name: order-pg-app
        connectionLimit: -1
      - name: payment_user
        ensure: present
        login: true
        passwordSecret:
          name: payment-pg-app
        connectionLimit: -1
      - name: product_user
        ensure: present
        login: true
        passwordSecret:
          name: product-pg-app
        connectionLimit: -1

  # Monitoring configuration
  monitoring:
    enablePodMonitor: true
    disableDefaultQueries: false
