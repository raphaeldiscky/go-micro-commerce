# OT-Container-Kit RedisCluster Configuration
# Docs: https://ot-container-kit.github.io/redis-operator/guide/redis-cluster.html
#
# This creates a 6-node Redis cluster (3 masters + 3 replicas)
# matching the Docker Compose configuration

---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster
  labels:
    app: redis
    component: cache
  annotations:
    # Enable pod anti-affinity between leader and follower pods
    # This ensures leader and follower pods are scheduled on different nodes
    # for better high availability
    # PS: you should enable operator webhook for this to work
    redisclusters.redis.redis.opstreelabs.in/role-anti-affinity: "true"
spec:
  # Cluster size (number of master nodes)
  clusterSize: 3
  clusterVersion: v8
  persistenceEnabled: true
  # Kubernetes cluster version (minimum k8s version)
  kubernetesConfig:
    image: quay.io/opstree/redis:v8.2.2
    imagePullPolicy: IfNotPresent
    # Resource configuration per Redis pod
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    # Service configuration
    service:
      type: ClusterIP
  # Storage configuration
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: standard
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
  # Number of replicas per master (1 replica per master = 3 masters + 3 replicas = 6 nodes total)
  clusterReplicas: 1
  # Redis password authentication
  redisSecret:
    name: redis-secret
    key: password
  # Redis exporter for Prometheus metrics
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.79.0
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    env:
      - name: REDIS_EXPORTER_INCL_SYSTEM_METRICS
        value: "true"
      - name: REDIS_EXPORTER_LOG_FORMAT
        value: "json"
  # Pod-level security context
  podSecurityContext:
    runAsUser: 1001
    runAsNonRoot: true
    fsGroup: 1001
  # Leader-specific configuration
  redisLeader:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: workload-type
                  operator: In
                  values:
                    - stateful
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - redis-cluster
              topologyKey: kubernetes.io/hostname
    tolerations:
      - key: workload-type
        operator: Equal
        value: stateful
        effect: NoSchedule
    nodeSelector:
      workload-type: stateful
  # Follower-specific configuration
  redisFollower:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: workload-type
                  operator: In
                  values:
                    - stateful
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - redis-cluster
              topologyKey: kubernetes.io/hostname
    tolerations:
      - key: workload-type
        operator: Equal
        value: stateful
        effect: NoSchedule
    nodeSelector:
      workload-type: stateful
  # Priority class (optional)
  priorityClassName: ""
  # Service annotations for Prometheus scraping
  serviceAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
    prometheus.io/path: "/metrics"
  # Pod labels
  podLabels:
    app: redis
    component: cache
  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
---
# Secret for Redis authentication
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  labels:
    app: redis
    component: cache
type: Opaque
stringData:
  password: "supersecret" # Matches Docker Compose password
