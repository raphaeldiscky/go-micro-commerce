apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-tls-cert
  namespace: traefik
  labels:
    app: traefik
    app.kubernetes.io/name: api-tls-cert
    app.kubernetes.io/component: certificate
spec:
  # Certificate for api.discky.com
  secretName: api-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - api.discky.com
  usages:
    - digital signature
    - key encipherment
