apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: traefik
  labels:
    app: traefik
    app.kubernetes.io/name: shared-gateway
    app.kubernetes.io/component: gateway
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.yourdomain.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls-cert
            namespace: traefik
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.yourdomain.com"
      allowedRoutes:
        namespaces:
          from: All
