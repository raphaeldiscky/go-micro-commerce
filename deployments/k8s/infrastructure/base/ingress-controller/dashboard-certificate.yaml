apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-tls-cert
  namespace: traefik
  labels:
    app: traefik
    app.kubernetes.io/name: traefik-dashboard-tls-cert
    app.kubernetes.io/component: certificate
spec:
  # Certificate for traefik.discky.com
  secretName: traefik-dashboard-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - traefik.discky.com
  usages:
    - digital signature
    - key encipherment
