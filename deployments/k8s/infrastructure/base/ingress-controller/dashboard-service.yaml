apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: traefik
  labels:
    app: traefik
    app.kubernetes.io/name: traefik-dashboard
    app.kubernetes.io/component: dashboard
  annotations:
    # Traefik pods deployed via Helm/Terraform, not visible to kube-linter static analysis
    ignore-check.kube-linter.io/dangling-service: "Traefik pods deployed via Helm"
spec:
  type: ClusterIP
  ports:
    - name: traefik
      port: 8080
      targetPort: traefik
      protocol: TCP
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik
