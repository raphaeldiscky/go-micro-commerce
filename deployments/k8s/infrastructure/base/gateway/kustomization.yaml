apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gateway

# Gateway tier combines REST API Gateway and GraphQL Apollo Router
resources:
  # Apollo Router - GraphQL Federation Gateway
  - ../apollo-router
  # API Gateway - REST API Gateway
  - ../../../workloads/base/api-gateway
  # Combined ingress for unified API endpoint
  - ingress.yaml
  - middlewares.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: gateway-tier
      app.kubernetes.io/managed-by: argocd
