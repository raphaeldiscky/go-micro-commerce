apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gateway

# Gateway tier - REST API Gateway with Gateway API routing
resources:
  # API Gateway - Custom REST API Gateway
  - ../api-gateway
  # HTTPRoute for Gateway API routing
  - httproute.yaml
  # Traefik middlewares (CORS, security headers)
  - middlewares.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: gateway-tier
      app.kubernetes.io/managed-by: argocd
