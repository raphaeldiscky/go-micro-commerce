apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  labels:
    app: gateway
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.middlewares: "gateway-api-cors@kubernetescrd,gateway-api-security-headers@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: gateway-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          # GraphQL endpoint - routes to Apollo Router
          - path: /graph
            pathType: Prefix
            backend:
              service:
                name: apollo-router
                port:
                  number: 4000
          # All other routes - routes to API Gateway (REST + gRPC via Connect-RPC)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
