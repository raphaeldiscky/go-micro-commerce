apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-gateway-route
  labels:
    app: api-gateway
spec:
  parentRefs:
    - name: shared-gateway
      namespace: traefik
  hostnames:
    - api.yourdomain.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-gateway
          port: 8080
