apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-router
  labels:
    app: apollo-router
    owner: raphaeldiscky
  annotations:
    email: raph.discky@gmail.com
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: apollo-router
  template:
    metadata:
      labels:
        app: apollo-router
    spec:
      serviceAccountName: apollo-router
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      restartPolicy: Always
      nodeSelector:
        workload-type: gateway
      tolerations:
        - key: workload-type
          operator: Equal
          value: gateway
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: apollo-router
          image: ghcr.io/apollographql/router:v2.7.0
          imagePullPolicy: IfNotPresent
          args:
            - --hot-reload
            - --supergraph
            - /config/supergraph-schema.graphql
            - --config
            - /config/router.yaml
          env:
            - name: APOLLO_ELV2_LICENSE
              value: "accept"
            - name: APOLLO_ROUTER_LOG
              value: "info"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: health
              containerPort: 8088
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: supergraph-schema
              mountPath: /config/supergraph-schema.graphql
              subPath: supergraph-schema.graphql
              readOnly: true
            - name: rhai-script
              mountPath: /config/main.rhai
              subPath: main.rhai
              readOnly: true
            - name: router-config
              mountPath: /config/router.yaml
              subPath: router.yaml
              readOnly: true
      volumes:
        - name: supergraph-schema
          configMap:
            name: apollo-supergraph-schema
        - name: rhai-script
          configMap:
            name: apollo-router-rhai
        - name: router-config
          configMap:
            name: apollo-router-config
