apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-backend-ingress
  namespace: gateway
  annotations:
    # cert-manager for automated TLS certificate management
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Traefik configuration
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    # Apply middlewares for CORS and security headers (cross-namespace reference)
    traefik.ingress.kubernetes.io/router.middlewares: "default-api-cors@kubernetescrd,default-security-headers@kubernetescrd"
  labels:
    app.kubernetes.io/name: api-backend-ingress
    app.kubernetes.io/component: ingress
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.discky.com
      secretName: api-backend-tls
  rules:
    - host: api.discky.com
      http:
        paths:
          # GraphQL endpoint (must be first for proper matching)
          - path: /graph
            pathType: Prefix
            backend:
              service:
                name: apollo-router
                port:
                  number: 4000
          # All other routes to API Gateway (REST + gRPC via Connect-RPC)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
