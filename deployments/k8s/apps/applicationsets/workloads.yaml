apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # Gateway namespace workloads
          - service: api-gateway
            namespace: gateway
          # Application namespace workloads
          - service: auth-service
            namespace: application
          - service: product-service
            namespace: application
          - service: order-service
            namespace: application
          - service: payment-service
            namespace: application
          - service: cart-service
            namespace: application
          - service: fulfillment-service
            namespace: application
          - service: notification-service
            namespace: application
          - service: chat-service
            namespace: application
          - service: external-secrets
            namespace: application
  template:
    metadata:
      name: "{{.service}}"
      labels:
        app.kubernetes.io/name: "{{.service}}"
        app.kubernetes.io/component: microservice
        app.kubernetes.io/managed-by: argocd
        environment: production
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "deployments/k8s/workloads/overlays/prod/{{.service}}"
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: gitops-notifications
    spec:
      project: default
      source:
        repoURL: git@github.com:raphaeldiscky/go-micro-commerce.git
        targetRevision: main
        path: "deployments/k8s/workloads/overlays/prod/{{.service}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      # Health assessment
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas # Ignore HPA-managed replicas
