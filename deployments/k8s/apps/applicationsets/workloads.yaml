apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:raphaeldiscky/go-micro-commerce.git
        revision: main
        directories:
          - path: deployments/k8s/workloads/overlays/prod/*
  template:
    metadata:
      name: "{{.path.basename}}"
      labels:
        app.kubernetes.io/name: "{{.path.basename}}"
        app.kubernetes.io/component: microservice
        app.kubernetes.io/managed-by: argocd
        environment: production
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "{{.path.path}}"
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: gitops-notifications
    spec:
      project: default
      source:
        repoURL: git@github.com:raphaeldiscky/go-micro-commerce.git
        targetRevision: main
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      # Health assessment
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas # Ignore HPA-managed replicas
