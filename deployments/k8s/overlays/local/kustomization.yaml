secretGenerator:
- name: postgres-credentials
  literals:
    - password=postgres

- name: api-gateway-jwt-keys
  files:
    - public.pem=secrets/api-gateway-public.pem

- name: auth-service-jwt-keys
  files:
    - private.pem=secrets/auth-service-private.pem
    - public.pem=secrets/auth-service-public.pem

- name: chat-service-jwt-keys
  files:
    - public.pem=secrets/chat-service-public.pem

  # Use local image tags for Kind/Minikube
images:
- name: api-gateway
  newName: localhost:5000/api-gateway
  newTag: local
- name: graphql-gateway
  newName: localhost:5000/graphql-gateway
  newTag: local
- name: auth-service
  newName: localhost:5000/auth-service
  newTag: local
- name: product-service
  newName: localhost:5000/product-service
  newTag: local
- name: order-service
  newName: localhost:5000/order-service
  newTag: local
- name: payment-service
  newName: localhost:5000/payment-service
  newTag: local
- name: cart-service
  newName: localhost:5000/cart-service
  newTag: local
- name: fulfillment-service
  newName: localhost:5000/fulfillment-service
  newTag: local
- name: notification-service
  newName: localhost:5000/notification-service
  newTag: local
- name: search-service
  newName: localhost:5000/search-service
  newTag: local
- name: chat-service
  newName: localhost:5000/chat-service
  newTag: local
labels:
- includeSelectors: true
  pairs:
    environment: local
    managed-by: kustomize
