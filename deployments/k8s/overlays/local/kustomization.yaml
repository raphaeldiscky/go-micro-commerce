      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem

  - name: graphql-gateway-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=4000

secretGenerator:
  - name: postgres-credentials
    literals:
      - password=postgres

  - name: api-gateway-jwt-keys
    files:
      - public.pem=secrets/api-gateway-public.pem

  - name: auth-service-jwt-keys
    files:
      - private.pem=secrets/auth-service-private.pem
      - public.pem=secrets/auth-service-public.pem

  - name: chat-service-jwt-keys
    files:
      - public.pem=secrets/chat-service-public.pem

# Image registry is handled by Tilt's default_registry() function
# No need for image remapping here - Tilt automatically prepends the correct registry

labels:
  - includeSelectors: true
    pairs:
      environment: local
      managed-by: kustomize
