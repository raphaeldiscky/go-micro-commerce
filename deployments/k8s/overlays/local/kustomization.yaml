apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: go-micro-commerce-local

namespace: default

namePrefix: local-


resources:
- ../../base/api-gateway
- ../../base/graphql-gateway
- ../../base/auth-service
- ../../base/product-service
- ../../base/order-service
- ../../base/payment-service
- ../../base/cart-service
- ../../base/fulfillment-service
- ../../base/notification-service
- ../../base/search-service
- ../../base/chat-service

# Local environment patches - minimal resources, single replicas
  # Reduce replicas to 1 for local development

  # Reduce resource requests/limits for local Kind/Minikube

  # Disable HPA in local environment
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 50m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 64Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 200m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 256Mi
  target:
    kind: Deployment
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 1
  target:
    kind: HorizontalPodAutoscaler
- patch: |-
    - op: add
      path: /spec/template/spec/hostAliases
      value:
        - ip: "172.23.0.1"
          hostnames:
            - "host.docker.internal"
  target:
    kind: Deployment
- patch: |-
    - op: add
      path: /spec/template/spec/volumes
      value:
        - name: jwt-keys
          secret:
            secretName: auth-service-jwt-keys
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts
      value:
        - name: jwt-keys
          mountPath: /app/keys
          readOnly: true
  target:
    kind: Deployment
    name: auth-service
- patch: |-
    - op: add
      path: /spec/template/spec/volumes
      value:
        - name: jwt-keys
          secret:
            secretName: api-gateway-jwt-keys
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts
      value:
        - name: jwt-keys
          mountPath: /app/keys
          readOnly: true
  target:
    kind: Deployment
    name: api-gateway
- patch: |-
    - op: add
      path: /spec/template/spec/volumes
      value:
        - name: jwt-keys
          secret:
            secretName: chat-service-jwt-keys
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts
      value:
        - name: jwt-keys
          mountPath: /app/keys
          readOnly: true
  target:
    kind: Deployment
    name: chat-service

configMapGenerator:
- name: common-config
  literals:
    - APP_ENVIRONMENT=local
    - APP_LOGGER_LEVEL=5
    - TRACING_SAMPLING_RATE=1.0

- name: api-gateway-config
  behavior: merge
  literals:
    - HTTP_SERVER_HOST=0.0.0.0
    - HTTP_SERVER_PORT=8080
    - JWKS_URL=http://host.docker.internal:8081/.well-known/jwks.json
    - SERVICE_DISCOVERY_TYPE=kubernetes
    - SERVICE_DISCOVERY_K8S_NAMESPACE=default
    - CONSUL_ENABLED=false
    - TRACING_URL=host.docker.internal:4318
    - TRACING_ENABLED=true
    - METRICS_ENABLED=true

- name: auth-service-config
  behavior: merge
  literals:
    - HTTP_SERVER_HOST=0.0.0.0
    - HTTP_SERVER_PORT=8081
    - POSTGRES_HOST=host.docker.internal
    - POSTGRES_PORT=15431
    - POSTGRES_DB=auth_db
    - POSTGRES_USER=postgres
    - POSTGRES_SSL_MODE=disable
    - KAFKA_BROKERS=host.docker.internal:9092,host.docker.internal:9093,host.docker.internal:9094
    - CONSUL_ENABLED=false
    - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
    - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem

- name: product-service-config
  behavior: merge
  literals:
    - HTTP_SERVER_HOST=0.0.0.0
    - HTTP_SERVER_PORT=8082
    - GRPC_SERVER_HOST=0.0.0.0
    - GRPC_SERVER_PORT=50052
    - POSTGRES_HOST=host.docker.internal
    - POSTGRES_PORT=15432
    - POSTGRES_DB=product_db
    - POSTGRES_USER=postgres
    - POSTGRES_SSL_MODE=disable
    - REDIS_ADDRS=host.docker.internal:6379,host.docker.internal:6380,host.docker.internal:6381,host.docker.internal:6382,host.docker.internal:6383,host.docker.internal:6384
    - KAFKA_BROKERS=host.docker.internal:9092,host.docker.internal:9093,host.docker.internal:9094
    - CONSUL_ENABLED=false
    - TRACING_URL=host.docker.internal:4318

