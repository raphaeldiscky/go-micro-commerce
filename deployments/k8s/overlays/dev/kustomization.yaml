apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: go-micro-commerce-dev

namespace: dev

namePrefix: dev-

labels:
- includeSelectors: true
  pairs:
    environment: dev
    managed-by: kustomize

resources:
  - ../../base/api-gateway
  - ../../base/graphql-gateway
  - ../../base/auth-service
  - ../../base/product-service
  - ../../base/order-service
  - ../../base/payment-service
  - ../../base/cart-service
  - ../../base/fulfillment-service
  - ../../base/notification-service
  - ../../base/search-service
  - ../../base/chat-service

# Dev environment patches
patches:
  # Set replicas to 1 for dev (cost optimization)
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Moderate resources for dev
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # HPA settings for dev
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

configMapGenerator:
  - name: common-config
    literals:
      - APP_ENVIRONMENT=dev
      - APP_LOGGER_LEVEL=4 # Info level
      - TRACING_SAMPLING_RATE=0.5 # 50% sampling for dev

images:
  # Use dev tags from container registry
  - name: api-gateway
    newName: your-registry.io/api-gateway
    newTag: dev-latest
  - name: graphql-gateway
    newName: your-registry.io/graphql-gateway
    newTag: dev-latest
  - name: auth-service
    newName: your-registry.io/auth-service
    newTag: dev-latest
  - name: product-service
    newName: your-registry.io/product-service
    newTag: dev-latest
  - name: order-service
    newName: your-registry.io/order-service
    newTag: dev-latest
  - name: payment-service
    newName: your-registry.io/payment-service
    newTag: dev-latest
  - name: cart-service
    newName: your-registry.io/cart-service
    newTag: dev-latest
  - name: fulfillment-service
    newName: your-registry.io/fulfillment-service
    newTag: dev-latest
  - name: notification-service
    newName: your-registry.io/notification-service
    newTag: dev-latest
  - name: search-service
    newName: your-registry.io/search-service
    newTag: dev-latest
  - name: chat-service
    newName: your-registry.io/chat-service
    newTag: dev-latest
