apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: go-micro-commerce-prod-asia-southeast2

namespace: production

namePrefix: prod-

labels:
  - includeSelectors: true
    pairs:
      environment: production
      region: asia-southeast2
      managed-by: kustomize

resources:
  - ../../../base/api-gateway
  - ../../../base/graphql-gateway
  - ../../../base/auth-service
  - ../../../base/product-service
  - ../../../base/order-service
  - ../../../base/payment-service
  - ../../../base/cart-service
  - ../../../base/fulfillment-service
  - ../../../base/notification-service
  - ../../../base/search-service
  - ../../../base/chat-service

# Production environment patches - full HA setup
patches:
  # Set replicas to 3 for production HA
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  # Production resources
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi

  # HPA settings for production
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

  # PDB for production - ensure at least 2 pods available during disruptions
  - target:
      kind: PodDisruptionBudget
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2

  # Add pod anti-affinity for HA across nodes
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                  - key: app
                    operator: In
                    values:
                    - api-gateway
                    - auth-service
                    - product-service
                    - order-service
                    - payment-service
                    - cart-service
                    - fulfillment-service
                    - notification-service
                    - search-service
                    - chat-service
                    - graphql-gateway
                topologyKey: kubernetes.io/hostname

configMapGenerator:
  - name: common-config
    literals:
      - APP_ENVIRONMENT=production
      - APP_LOGGER_LEVEL=3 # Warn level for production
      - TRACING_SAMPLING_RATE=0.1 # 10% sampling
      - REGION=asia-southeast2

images:
  # Use production tags from container registry with version pinning
  - name: api-gateway
    newName: your-registry.io/api-gateway
    newTag: v1.0.0 # Pin to specific versions in production
  - name: graphql-gateway
    newName: your-registry.io/graphql-gateway
    newTag: v1.0.0
  - name: auth-service
    newName: your-registry.io/auth-service
    newTag: v1.0.0
  - name: product-service
    newName: your-registry.io/product-service
    newTag: v1.0.0
  - name: order-service
    newName: your-registry.io/order-service
    newTag: v1.0.0
  - name: payment-service
    newName: your-registry.io/payment-service
    newTag: v1.0.0
  - name: cart-service
    newName: your-registry.io/cart-service
    newTag: v1.0.0
  - name: fulfillment-service
    newName: your-registry.io/fulfillment-service
    newTag: v1.0.0
  - name: notification-service
    newName: your-registry.io/notification-service
    newTag: v1.0.0
  - name: search-service
    newName: your-registry.io/search-service
    newTag: v1.0.0
  - name: chat-service
    newName: your-registry.io/chat-service
    newTag: v1.0.0
