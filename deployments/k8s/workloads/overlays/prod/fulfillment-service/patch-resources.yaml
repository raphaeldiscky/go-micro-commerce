apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-service
spec:
  selector: {}
  template:
    spec:
      containers:
        - name: fulfillment-service
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
