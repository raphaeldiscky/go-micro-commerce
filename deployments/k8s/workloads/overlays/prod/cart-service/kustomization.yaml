apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: application

resources:
  - ../../../base/cart-service

labels:
  - pairs:
      environment: production
      app.kubernetes.io/managed-by: argocd

patches:
  - path: patch-replicas.yaml
  - path: patch-resources.yaml
  - path: patch-hpa.yaml

configMapGenerator:
  - name: cart-service-config
    behavior: merge
    literals:
      - ENV=production
      - LOG_LEVEL=info

images:
  - name: cart-service
    newTag: latest
