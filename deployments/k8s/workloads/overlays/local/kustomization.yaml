apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: go-micro-commerce-local

namespace: application

namePrefix: local-

resources:
  - ../../base/api-gateway
  - ../../base/auth-service
  - ../../base/product-service
  - ../../base/order-service
  - ../../base/payment-service
  - ../../base/cart-service
  - ../../base/fulfillment-service
  - ../../base/notification-service
  - ../../base/chat-service

# Local environment patches - minimal resources, single replicas
# Reduce replicas to 1 for local development

# Disable HPA in local environment
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
  # hostAliases patch removed - using K8s DNS instead of host.docker.internal
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: jwt-keys
            secret:
              secretName: auth-service-jwt-keys
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: jwt-keys
            mountPath: /app/keys
            readOnly: true
    target:
      kind: Deployment
      name: auth-service
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: jwt-keys
            secret:
              secretName: api-gateway-jwt-keys
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: jwt-keys
            mountPath: /app/keys
            readOnly: true
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: jwt-keys
            secret:
              secretName: chat-service-jwt-keys
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: jwt-keys
            mountPath: /app/keys
            readOnly: true
    target:
      kind: Deployment
      name: chat-service

configMapGenerator:
  - name: common-config
    literals:
      - APP_ENVIRONMENT=local
      - APP_LOGGER_LEVEL=5
      - TRACING_SAMPLING_RATE=1.0

  - name: api-gateway-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8080
      - JWKS_URL=http://local-auth-service.application.svc.cluster.local:8081/.well-known/jwks.json
      - SERVICE_DISCOVERY_TYPE=kubernetes
      - SERVICE_DISCOVERY_K8S_NAMESPACE=application
      - SERVICE_DISCOVERY_K8S_PREFIX=local-
      - CONSUL_ENABLED=false
      - TRACING_URL=otel-collector.default.svc.cluster.local:4318
      - TRACING_ENABLED=true
      - METRICS_ENABLED=true

  - name: auth-service-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8081
      - POSTGRES_HOST=authshared-pg-rw.application.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=auth_user
      - POSTGRES_SSL_MODE=disable
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.application.svc.cluster.local:9092
      - CONSUL_ENABLED=false
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem

  - name: product-service-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8082
      - GRPC_SERVER_HOST=0.0.0.0
      - GRPC_SERVER_PORT=50052
      - POSTGRES_HOST=productshared-pg-rw.application.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=product_db
      - POSTGRES_USER=product_user
      - POSTGRES_SSL_MODE=disable
      - REDIS_ADDRS=redis-cluster-leader-0.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-1.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-2.redis-cluster-leader-headless.application.svc.cluster.local:6379
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.application.svc.cluster.local:9092
      - CONSUL_ENABLED=false
      - TRACING_URL=otel-collector.default.svc.cluster.local:4318

  - name: order-service-config
