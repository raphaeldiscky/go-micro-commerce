      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8083
      - POSTGRES_HOST=ordershared-pg-rw.application.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=order_db
      - POSTGRES_USER=order_user
      - POSTGRES_SSL_MODE=disable
      - REDIS_ADDRS=redis-cluster-leader-0.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-1.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-2.redis-cluster-leader-headless.application.svc.cluster.local:6379
      - ASYNQ_REDIS_ADDRS=redis-cluster-leader-0.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-1.redis-cluster-leader-headless.application.svc.cluster.local:6379,redis-cluster-leader-2.redis-cluster-leader-headless.application.svc.cluster.local:6379
      - KAFKA_BROKERS=kafka-cluster-kafka-bootstrap.application.svc.cluster.local:9092
      - CONSUL_ENABLED=false
      - TRACING_URL=otel-collector.default.svc.cluster.local:4318

  - name: payment-service-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8084
      - GRPC_SERVER_HOST=0.0.0.0
      - GRPC_SERVER_PORT=50054
      - POSTGRES_HOST=paymentshared-pg-rw.application.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=payment_db
