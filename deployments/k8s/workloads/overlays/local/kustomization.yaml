  - name: fulfillment-service-config
    behavior: merge
    literals:
      - HTTP_SERVER_HOST=0.0.0.0
      - HTTP_SERVER_PORT=8086
      - GRPC_SERVER_HOST=0.0.0.0
      - GRPC_SERVER_PORT=50056
      - POSTGRES_HOST=fulfillmentshared-pg-rw.application.svc.cluster.local
      - POSTGRES_PORT=5432
      - POSTGRES_DB=fulfillment_db
