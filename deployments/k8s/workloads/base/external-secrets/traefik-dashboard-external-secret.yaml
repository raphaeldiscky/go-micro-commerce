apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traefik-dashboard-credentials
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: traefik
    app.kubernetes.io/name: traefik-dashboard
    app.kubernetes.io/component: secret
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: traefik-dashboard-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # BasicAuth format: username:hashed-password
        # Password will be hashed using htpasswd format
        users: "admin:{{ .password | htpasswd }}"
  data:
    - secretKey: password
      remoteRef:
        key: traefik-dashboard-password
