apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: application
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: secret
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        SMTP_USERNAME: "{{ .smtpUsername }}"
        SMTP_PASSWORD: "{{ .smtpPassword }}"
        SMTP_HOST: "{{ .smtpHost }}"
        SENDGRID_API_KEY: "{{ .sendgridApiKey }}"
  data:
    - secretKey: smtpUsername
      remoteRef:
        key: notification-service-smtp-username
    - secretKey: smtpPassword
      remoteRef:
        key: notification-service-smtp-password
    - secretKey: smtpHost
      remoteRef:
        key: notification-service-smtp-host
    - secretKey: sendgridApiKey
      remoteRef:
        key: notification-service-sendgrid-api-key
