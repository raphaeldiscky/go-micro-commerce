apiVersion: v1
kind: Service
metadata:
  name: chat-service
  labels:
    app: chat-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: chat-service
  ports:
    - name: http
      port: 8088
      targetPort: http
      protocol: TCP
    - name: websocket
      port: 9098
      targetPort: websocket
      protocol: TCP
  sessionAffinity: None
