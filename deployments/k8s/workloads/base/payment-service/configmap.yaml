apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  labels:
    app: payment-service
data:
  APP_LOGGER_LEVEL: "4"
  APP_TIMEOUT_SHUTDOWN: "10s"
  # Database
  POSTGRES_HOST: "shared-pg-rw"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "payment_user"
  POSTGRES_DATABASE: "payment_db"
  # Observability
  TRACING_URL: "otel-collector:4318"
  TRACING_SAMPLING_RATE: "0.1"
  METRICS_PATH: "/metrics"
# Add service-specific config here in overlays
# Override APP_ENVIRONMENT and TRACING_ENVIRONMENT in overlays
