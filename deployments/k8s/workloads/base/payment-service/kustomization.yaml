apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: payment-service

namespace: application

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: payment-service
      app.kubernetes.io/component: backend
      app.kubernetes.io/part-of: go-micro-commerce

resources:
  # - migration-job.yaml
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: payment-service
    newName: payment-service
    newTag: latest
  - name: payment-service-migrations
    newName: payment-service-migrations
    newTag: latest
