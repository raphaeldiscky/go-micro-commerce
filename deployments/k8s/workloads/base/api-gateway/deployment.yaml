apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: gateway
    version: v1
    owner: raphaeldiscky
  annotations:
    email: raph.discky@gmail.com
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-gateway
      nodeSelector:
        workload-type: gateway
      tolerations:
        - key: workload-type
          operator: Equal
          value: gateway
          effect: NoSchedule
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      restartPolicy: Always
      nodeSelector:
        workload-type: gateway
      tolerations:
        - key: workload-type
          operator: Equal
          value: gateway
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: ghcr.io/raphaeldiscky/go-micro-commerce/api-gateway:v0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_NAME
              value: "api-gateway"
            - name: APP_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: APP_ENVIRONMENT
            - name: HTTP_SERVER_HOST
              value: "0.0.0.0"
            - name: HTTP_SERVER_PORT
              value: "8080"
            - name: CONSUL_ENABLED
              value: "false"
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_SERVICE_NAME
              value: "api-gateway"
            - name: METRICS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
