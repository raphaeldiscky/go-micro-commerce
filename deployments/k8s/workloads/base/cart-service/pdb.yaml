apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cart-service
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: cart-service
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app: cart-service
    matchExpressions:
      - key: component
        operator: NotIn
        values:
          - migration
