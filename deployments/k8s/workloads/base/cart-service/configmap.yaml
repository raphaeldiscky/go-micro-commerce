apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-service-config
  labels:
    app: cart-service
data:
  APP_LOGGER_LEVEL: "4"
  APP_TIMEOUT_SHUTDOWN: "10s"
  # Observability
  TRACING_URL: "otel-collector:4318"
  TRACING_SAMPLING_RATE: "0.1"
  METRICS_PATH: "/metrics"
# Add service-specific config here in overlays
# Override APP_ENVIRONMENT and TRACING_ENVIRONMENT in overlays
