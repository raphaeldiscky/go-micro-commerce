apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: auth-service
spec:
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app: auth-service
    matchExpressions:
      - key: component
        operator: NotIn
        values:
          - migration
