apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: auth-service

namespace: application

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: go-micro-commerce

resources:
  - migration-job.yaml
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: auth-service
    newName: auth-service
    newTag: latest
  - name: auth-service-migrations
    newName: auth-service-migrations
    newTag: latest
