apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: application

metadata:
  name: auth-service

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: auth-service
      app.kubernetes.io/component: backend
      app.kubernetes.io/part-of: go-micro-commerce

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

images:
  - name: auth-service
    newName: auth-service
    newTag: latest
  - name: auth-service-migrations
    newName: auth-service-migrations
    newTag: latest
