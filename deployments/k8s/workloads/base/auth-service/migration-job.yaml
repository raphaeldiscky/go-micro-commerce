apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migration
  labels:
    app: auth-service
    component: migration
    tier: infrastructure
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: auth-service
        component: migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: ghcr.io/raphaeldiscky/go-micro-commerce/auth-service-migrations:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          migrate -path=/migrations \
            -database "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable" \
            up
        env:
        - name: DB_HOST
          value: "auth-pg-rw.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "auth_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: auth-pg-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-pg-app
              key: password
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
