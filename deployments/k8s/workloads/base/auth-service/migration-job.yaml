apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migration
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    email: "raph.discky@gmail.com"
  labels:
    app: auth-service
    component: migration
    tier: infrastructure
    owner: "raphaeldiscky"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: auth-service
        component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: auth-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      containers:
        - name: migrate
          image: ghcr.io/raphaeldiscky/go-micro-commerce/auth-service-migrations:v0.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              migrate -path=/migrations \
                -database "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable" \
                up
          env:
            - name: DB_HOST
              value: "shared-pg-rw.application.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "auth_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-pg-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-pg-app
                  key: password
          livenessProbe:
            exec:
              command: ["ls"]
            initialDelaySeconds: 5
            periodSeconds: 300
          readinessProbe:
            exec:
              command: ["ls"]
            initialDelaySeconds: 5
            periodSeconds: 300
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
