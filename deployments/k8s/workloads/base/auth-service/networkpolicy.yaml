# NetworkPolicy for auth-service
# Restricts ingress to specific namespaces and defines egress rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from gateway namespace (Traefik, API Gateway)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - protocol: TCP
          port: 8081
    # Allow traffic from application namespace (inter-service communication)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: application
      ports:
        - protocol: TCP
          port: 8081
    # Allow traffic from monitoring namespace (Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow PostgreSQL connections (pods in application namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: application
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis connections
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow Kafka connections
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
      ports:
        - protocol: TCP
          port: 9092
    # Allow OpenTelemetry collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Allow inter-service communication within application namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: application
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
        - protocol: TCP
          port: 8088
        - protocol: TCP
          port: 8089
