apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: order-service

namespace: application

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: go-micro-commerce

resources:
  # - migration-job.yaml  # Temporarily disabled to unblock deployment updates
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: order-service
    newName: order-service
    newTag: latest
  - name: order-service-migrations
    newName: order-service-migrations
    newTag: latest
