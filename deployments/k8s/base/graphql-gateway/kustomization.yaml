apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: graphql-gateway

namespace: default

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: graphql-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: go-micro-commerce

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: graphql-gateway
    newName: graphql-gateway
    newTag: latest
