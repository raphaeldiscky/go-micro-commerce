apiVersion: batch/v1
kind: Job
metadata:
  name: cart-service-migration
  labels:
    app: cart-service
    component: migration
    tier: infrastructure
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: cart-service
        component: migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: cart-service-migrations:latest
        imagePullPolicy: IfNotPresent
        command:
        - migrate
        args:
        - -path=/migrations
        - -database
        - postgres://postgres:postgres@postgresql-cart:5432/cart_db?sslmode=disable
        - up
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
