apiVersion: batch/v1
kind: Job
metadata:
  name: search-service-migration
  labels:
    app: search-service
    component: migration
    tier: infrastructure
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: search-service
        component: migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: search-service-migrations:latest
        imagePullPolicy: IfNotPresent
        command:
        - migrate
        args:
        - -path=/migrations
        - -database
        - postgres://postgres:postgres@postgresql-search:5432/search_db?sslmode=disable
        - up
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
