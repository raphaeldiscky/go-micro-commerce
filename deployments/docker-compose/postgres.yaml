services:
  postgres-auth:
    image: postgres:17.5-alpine
    container_name: postgres-auth
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_db
    ports:
      - "15432:5432"
    networks:
      - go-micro-commerce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 500m

  postgres-product:
