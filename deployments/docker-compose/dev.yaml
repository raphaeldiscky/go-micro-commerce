      mailhog:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8085/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build:
      context: ../..
      dockerfile: api-gateway/Dockerfile
