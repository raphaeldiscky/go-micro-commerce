      - "8080:8080"
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  go-micro-template:
    name: go-micro-template
    external: true
