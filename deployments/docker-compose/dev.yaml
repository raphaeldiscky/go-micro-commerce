      - ../../payment-service/.env:/app/.env:ro
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      postgres-payment:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8084/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
