      - "8083:8083"
    depends_on:
      postgres-order:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8083/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
