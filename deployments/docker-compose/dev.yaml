services:
  auth-service:
    build:
      context: ../..
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    volumes:
      - ../../auth-service/.env:/app/.env:ro
    restart: unless-stopped
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      consul:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  product-service:
    build:
      context: ../..
      dockerfile: product-service/Dockerfile
    container_name: product-service
    volumes:
      - ../../product-service/.env:/app/.env:ro
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      postgres-product:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8082/health",
        ]
      interval: 30s
