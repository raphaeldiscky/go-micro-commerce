services:
  # API Gateway Service (now works alongside Traefik)
  # Your other services like auth-service and product-service should not have these Traefik labels.
  # Traefik is an API Gateway for external traffic, and those services are internal.
  # The api-gateway is responsible for routing to them internally.
  api-gateway:
    image: ghcr.io/raphaeldiscky/go-micro-commerce/api-gateway:latest
    build:
      context: ../..
      dockerfile: api-gateway/Dockerfile
    volumes:
      - ../../api-gateway/.env:/app/.env
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - go-micro-commerce
    environment:
      - APP_ENVIRONMENT="development"
      - SERVICE_NAME="api-gateway"
      - HTTP_SERVER_PORT=8080
      - SERVER_READ_TIMEOUT=15s
      - SERVER_WRITE_TIMEOUT=15s
      - JWT_SECRET=secret
      - JWT_EXPIRATION_TIME=24h
      - JWT_REFRESH_TIME=72h
      - JWT_ISSUER=api-gateway
      - JWT_TOKEN_LOOKUP=header:Authorization
      - JWT_AUTH_SCHEME=Bearer
      - JWT_SIGNING_METHOD=HS256
      - JWT_CONTEXT_KEY=user
      - SERVICE_DISCOVERY_TYPE=consul
      - SERVICE_DISCOVERY_ADDRESS=consul:8500
      - SERVICE_DISCOVERY_TIMEOUT=5s
      - SERVICE_DISCOVERY_CONSUL_ADDRESS=consul:8500
      - SERVICE_DISCOVERY_CONSUL_DATACENTER=dc1
      - SERVICE_DISCOVERY_CONSUL_TOKEN=your-consul-token-here
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - RATE_LIMIT_BURST_LIMIT=10
      - TRACING_ENABLED=true
      - TRACING_URL=http://localhost:4318
      - TRACING_SERVICE_NAME=api-gateway
      - TRACING_SAMPLING_RATE=0.1
      - TRACING_ENVIRONMENT=development
      - TRACING_BATCH_TIMEOUT=5
      - TRACING_EXPORT_TIMEOUT=30
      - TRACING_METADATA=api-gateway
      - METRICS_ENABLED=true
      - METRICS_PATH=/metrics
      - METRICS_PORT=9090
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      # Traefik labels for service discovery
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"
      - "traefik.http.services.api-gateway.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api-gateway.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.middlewares.api-gateway-ratelimit.ratelimit.burst=100"
      - "traefik.http.middlewares.api-gateway-ratelimit.ratelimit.average=10"
      - "traefik.http.routers.api-gateway.middlewares=api-gateway-ratelimit"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m

  auth-service:
    image: ghcr.io/raphaeldiscky/go-micro-commerce/auth-service:latest
    container_name: auth-service
    build:
      context: ../..
      dockerfile: auth-service/Dockerfile
    volumes:
      - ../../auth-service/.env:/app/.env
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - go-micro-commerce
    environment:
      - HTTP_SERVER_PORT=8081
      - POSTGRES_HOST=postgres-auth
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
      redis-6:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      consul:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  product-service:
