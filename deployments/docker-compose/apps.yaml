name: "go-micro-template"

services:
  api-gateway:
    image: ghcr.io/raphaeldiscky/go-micro-template:api-gateway
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - CONSUL_ADDRESS=consul:8500
      - JWT_SECRET=your-256-bit-secret-key-here-change-in-production
      - REDIS_URL=redis://redis:6379
      - TRACING_JAEGER_URL=http://jaeger:4318/v1/traces
    depends_on:
      consul:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - go-micro-template
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    image: ghcr.io/raphaeldiscky/go-micro-template:auth-service
    build:
      context: ../../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - HTTP_SERVER_PORT=8081
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=microservices
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=auth_service
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      consul:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  product-service:
    image: ghcr.io/raphaeldiscky/go-micro-template:product-service
    build:
      context: ../../product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - HTTP_SERVER_PORT=8083
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=microservices
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=product_service
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      - postgres
      - redis
      - kafka
      - consul
    networks:
      - go-micro-template

  order-service:
    image: ghcr.io/raphaeldiscky/go-micro-template:order-service
    build:
      context: ../../order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - HTTP_SERVER_PORT=8084
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=microservices
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=order_service
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      - postgres
      - redis
      - kafka
      - consul
    networks:
      - go-micro-template

  notification-service:
    image: ghcr.io/raphaeldiscky/go-micro-template:notification-service
    build:
      context: ../../notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - HTTP_SERVER_PORT=8082
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=notification_service
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=your-email@gmail.com
      - SMTP_PASSWORD=your-app-password
    depends_on:
      - postgres
      - kafka
      - consul
    networks:
      - go-micro-template
