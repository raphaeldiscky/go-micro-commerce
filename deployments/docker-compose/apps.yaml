      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres-product:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
      redis-6:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      # Traefik labels for direct access (optional, for testing)
      # TODO: Remove in production
      - "traefik.enable=true"
      - "traefik.http.routers.product-service.rule=Host(`products.localhost`)"
      - "traefik.http.routers.product-service.entrypoints=web"
      - "traefik.http.services.product-service.loadbalancer.server.port=8082"
      - "traefik.http.services.product-service.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.product-service.loadbalancer.healthcheck.interval=30s"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m

  order-service:
