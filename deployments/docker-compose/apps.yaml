name: "go-micro-template"

services:
  api-gateway:
    image: ghcr.io/raphaeldiscky/go-micro-template/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - CONSUL_ADDRESS=consul:8500
      - JWT_SECRET=your-256-bit-secret-key-here-change-in-production
      - REDIS_URL=redis://redis:6379
      - TRACING_URL=http://otel-collector:4318/v1/traces
    depends_on:
      consul:
        condition: service_healthy
      redis:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m

  auth-service:
    image: ghcr.io/raphaeldiscky/go-micro-template:auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      - HTTP_SERVER_PORT=8081
      - DB_HOST=postgres-auth
      - DB_PORT=15431
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=auth_service
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      consul:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  product-service:
    image: ghcr.io/raphaeldiscky/go-micro-template/product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - HTTP_SERVER_PORT=8082
      - DB_HOST=postgres-product
      - DB_PORT=25432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      consul:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m

  order-service:
    image: ghcr.io/raphaeldiscky/go-micro-template/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - HTTP_SERVER_PORT=8083
      - DB_HOST=postgres-order
      - DB_PORT=35432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      consul:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m

  notification-service:
    image: ghcr.io/raphaeldiscky/go-micro-template/notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - HTTP_SERVER_PORT=8084
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_EMAIL=your-email@gmail.com
      - CONSUL_ADDRESS=consul:8500
    depends_on:
      consul:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m
