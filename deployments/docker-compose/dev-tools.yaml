# Development and debugging tools
services:
  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - go-micro-commerce
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Swagger UI for API documentation
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.10.5
    container_name: swagger-ui
    ports:
      - "8091:8080"
    environment:
      - SWAGGER_JSON_URL=http://localhost:8081/swagger.json
    networks:
      - go-micro-commerce

  # Asynq UI for background jobs
  asynq-ui:
    image: hibiken/asynqmon:latest
    container_name: asynq-ui
    ports:
      - "8092:8080" # Web UI port
    environment:
      - REDIS_CLUSTER_NODES=redis-1:6379,redis-2:6379,redis-3:6379,redis-4:6379,redis-5:6379,redis-6:6379
      - REDIS_PASSWORD=supersecret
      - REDIS_DB=0
    networks:
      - go-micro-commerce
    depends_on:
      redis-1:
        condition: service_healthy

networks:
  go-micro-commerce:
    name: go-micro-commerce
    external: true
