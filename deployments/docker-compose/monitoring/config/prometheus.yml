global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "api-gateway"
    static_configs:
      - targets: ["172.19.0.1:8080"]
    metrics_path: "/metrics"
    scrape_interval: 5s
  - job_name: "product-service"
    static_configs:
      - targets: ["172.19.0.1:8082"]
    metrics_path: "/metrics"
    scrape_interval: 5s
  - job_name: "cart-service"
    static_configs:
      - targets: ["172.19.0.1:8089"]
    metrics_path: "/metrics"
    scrape_interval: 5s
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
    metrics_path: "/metrics"
    scrape_interval: 5s
  - job_name: "otel-collector-forwarded-metrics"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: "/metrics"
    scrape_interval: 5s
  - job_name: "consul"
    static_configs:
      - targets: ["consul:8500"]
    metrics_path: "/v1/agent/metrics"
    params:
      format: ["prometheus"]
    scrape_interval: 5s
