# Production overrides for docker-compose
name: go-micro-template

services:
  api-gateway:
    image: ghcr.io/raphaeldiscky/go-ddd-template/api-gateway:latest
    environment:
      - ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  auth-service:
    image: ghcr.io/raphaeldiscky/go-ddd-template/auth-service:latest
    environment:
      - ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  notification-service:
    image: ghcr.io/raphaeldiscky/go-ddd-template/notification-service:latest
    environment:
      - ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  product-service:
    image: ghcr.io/raphaeldiscky/go-ddd-template/product-service:latest
    environment:
      - ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  order-service:
    image: ghcr.io/raphaeldiscky/go-ddd-template/order-service:latest
    environment:
      - ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  consul:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  prometheus:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  jaeger:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
