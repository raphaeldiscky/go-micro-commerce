# Local infrastructure services
name: go-micro-template

services:
  consul:
    image: consul:1.15
    container_name: consul
    ports:
      - "8500:8500"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: consul agent -server -bootstrap -ui -client=0.0.0.0 -bind=0.0.0.0
    networks:
      - go-micro-template
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3

include:
  - postgres.yaml
  - kafka.yaml
  - redis.yaml

networks:
  go-micro-template:
    name: go-micro-template
    external: true
