# Local infrastructure services
name: go-micro-template

services:
  consul:
    image: consul:1.15
    container_name: consul
    ports:
      - "8500:8500"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: consul agent -server -bootstrap -ui -client=0.0.0.0 -bind=0.0.0.0
    networks:
      - go-micro-template
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3

  product-service:
    build:
      context: ../../services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: always
    networks:
      - go-micro-template

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - consul
      - product-service
    networks:
      - go-micro-template

include:
  - pgpool.yaml
  - kafka.yaml
  - redis.yaml

volumes:
  consul_data:

networks:
  go-micro-template:
    name: go-micro-template
    external: true
