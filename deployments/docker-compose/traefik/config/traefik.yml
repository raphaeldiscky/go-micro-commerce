# API Routes Configuration
http:
  routers:
    # Main API Gateway - handles all external traffic
    api-gateway:
      rule: "Host(`api.localhost`)"
      service: api-gateway
      entryPoints:
        - web
      middlewares:
        - rate-limit
        - auth-headers

    # GraphQL Gateway
    graphql-gateway:
      rule: "Host(`graphql.localhost`)"
      service: graphql-gateway
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Auth Service (for testing/admin)
    auth-service:
      rule: "Host(`auth.localhost`)"
      service: auth-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Product Service (for testing/admin)
    product-service:
      rule: "Host(`products.localhost`)"
      service: product-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Order Service (for testing/admin)
    order-service:
      rule: "Host(`orders.localhost`)"
      service: order-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Payment Service (for testing/admin)
    payment-service:
      rule: "Host(`payments.localhost`)"
      service: payment-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Fulfillment Service (for testing/admin)
    fulfillment-service:
      rule: "Host(`fulfillments.localhost`)"
      service: fulfillment-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Notification Service (for testing/admin)
    notification-service:
      rule: "Host(`notifications.localhost`)"
      service: notification-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Search Service (for testing/admin)
    search-service:
      rule: "Host(`searchs.localhost`)"
      service: search-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Chat Service (for testing/admin)
    chat-service:
      rule: "Host(`chats.localhost`)"
      service: chat-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

    # Direct access to Admin Service (for testing/admin)
    cart-service:
      rule: "Host(`cart.localhost`)"
      service: cart-service
      entryPoints:
        - web
      middlewares:
        - rate-limit

  services:
    api-gateway:
      loadBalancer:
        servers:
          - url: "http://api-gateway:8080"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: api-gateway

    graphql-gateway:
      loadBalancer:
        servers:
          - url: "http://graphql-gateway:4000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s

    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8081"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: auth-service

    product-service:
      loadBalancer:
        servers:
          - url: "http://product-service:8082"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: product-service

    order-service:
      loadBalancer:
        servers:
          - url: "http://order-service:8083"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: order-service

    payment-service:
      loadBalancer:
        servers:
          - url: "http://payment-service:8084"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: payment-service

    fulfillment-service:
      loadBalancer:
        servers:
          - url: "http://fulfillment-service:8085"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: fulfillment-service

    notification-service:
      loadBalancer:
        servers:
          - url: "http://notification-service:8086"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: notification-service

    search-service:
      loadBalancer:
        servers:
          - url: "http://search-service:8087"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: search-service

    chat-service:
      loadBalancer:
        servers:
          - url: "http://chat-service:8088"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: chat-service

    cart-service:
      loadBalancer:
        servers:
          - url: "http://cart-service:8089"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          headers:
            Host: cart-service

  middlewares:
    rate-limit:
      rateLimit:
        burst: 100
        average: 10

    auth-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: http
          X-Forwarded-Host: api.localhost
