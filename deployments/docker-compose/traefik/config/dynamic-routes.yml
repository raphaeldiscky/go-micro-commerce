# Dynamic Routes Configuration using Internal Service Discovery
http:
  routers:
    # API Gateway - Main entry point for external clients
    api-gateway-external:
      rule: "Host(`api.localhost`) && PathPrefix(`/`)"
      service: api-gateway-service
      entryPoints:
        - web
      middlewares:
        - rate-limit
        - cors-headers
      priority: 1

    # Product Service - Direct access for testing/admin (optional)
    product-service-direct:
      rule: "Host(`products.localhost`)"
      service: product-service-service
      entryPoints:
        - web
      middlewares:
        - rate-limit
        - cors-headers
      priority: 2

    # Health check endpoints - accessible without authentication
    health-checks:
      rule: "Host(`api.localhost`) && Path(`/health`)"
      service: api-gateway-service
      entryPoints:
        - web
      priority: 10

  services:
    api-gateway-service:
      loadBalancer:
        servers:
          - url: "http://api-gateway:8080"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          scheme: http
          headers:
            Host: api-gateway
        passHostHeader: true

    product-service-service:
      loadBalancer:
        servers:
          - url: "http://product-service:8082"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          scheme: http
          headers:
            Host: product-service
        passHostHeader: true

  middlewares:
    rate-limit:
      rateLimit:
        burst: 100
        average: 10
        period: 1m

    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowOriginList:
          - "*"
        accessControlAllowHeaders:
          - "*"
        customRequestHeaders:
          X-Forwarded-Proto: "http"
          X-Real-IP: ""
        customResponseHeaders:
          X-Service-Version: "1.0.0"

    auth-middleware:
      forwardAuth:
        address: "http://api-gateway:8080/auth/validate"
        authResponseHeaders:
          - X-User-ID
          - X-User-Role
