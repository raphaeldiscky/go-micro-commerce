checks:
  # Exclude opinionated checks that don't fit our workflow
  exclude:
    # Not all Go applications support read-only root filesystem
    - "no-read-only-root-fs"
    # Anti-affinity is managed at the infrastructure level
    - "no-anti-affinity"

  # Explicitly include important security and reliability checks
  include:
    # Security checks
    - "latest-tag"
    - "privileged-container"
    - "run-as-non-root"
    - "privilege-escalation-container"
    - "sensitive-host-mounts"
    - "host-network"
    - "host-pid"
    - "host-ipc"
    - "env-var-secret"

    # Reliability checks
    - "dangling-service"
    - "mismatching-selector"
    - "duplicate-env-var"
    - "env-var-secret"
    - "deprecated-service-account-field"

    # Resource checks
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "minimum-replica-count"

    # PDB checks
    - "pdb-min-available"
    - "pdb-unhealthy-pod-eviction-policy"

# Custom object configuration
customChecks: []
