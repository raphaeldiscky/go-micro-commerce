supergraph:
  # Listen on all interfaces
  listen: 0.0.0.0:4000
  # Supergraph endpoint path
  path: /
  # Introspection enabled for development
  introspection: true
  # Defer support for @defer directive
  defer_support: true
# CORS configuration (v2 policy-based structure)
cors:
  allow_credentials: true
  methods:
    - GET
    - POST
    - OPTIONS
  policies:
    - origins:
        - http://localhost:3000 # Frontend (default)
        - http://localhost:3001 # Frontend (actual port)
        - http://localhost:8080 # API Gateway
        - http://graphql.localhost # Traefik routing
      match_origins:
        - "^http://localhost:[0-9]+$" # Allow any localhost port
      allow_credentials: true
      allow_headers:
        - Content-Type
        - Authorization
        - X-User-ID
        - X-Email
        - X-Roles
        - X-Is-Active
        - apollographql-client-name
        - apollographql-client-version
      expose_headers:
        - X-Request-ID
# Rhai script for Set-Cookie header propagation
rhai:
  main: /app/main.rhai
# Header propagation to subgraphs
headers:
  all:
    request:
      - propagate:
          matching: ".*" # Propagate all headers
      - insert:
          name: "X-Forwarded-For"
          from_context: "apollo_client_ip"
  subgraphs:
    auth-service:
      request:
        - propagate:
            named: "authorization"
        - propagate:
            named: "cookie"
        - propagate:
            named: "X-User-ID"
        - propagate:
            named: "X-Email"
        - propagate:
            named: "X-Roles"
        - propagate:
            named: "X-Is-Active"
        - insert:
            name: "X-Gateway"
            value: "graphql-gateway"
        - insert:
            name: "X-Client-IP"
            from_context: "apollo_client_ip"
        - propagate:
            named: "user-agent"
            rename: "X-User-Agent"
    chat-service:
      request:
        - propagate:
            named: "authorization"
        - propagate:
            named: "cookie"
        - propagate:
            named: "X-User-ID"
        - propagate:
            named: "X-Email"
        - propagate:
            named: "X-Roles"
        - propagate:
            named: "X-Is-Active"
        - insert:
            name: "X-Gateway"
            value: "graphql-gateway"
        - insert:
            name: "X-Client-IP"
            from_context: "apollo_client_ip"
        - propagate:
            named: "user-agent"
            rename: "X-User-Agent"
    notification-service:
      request:
        - propagate:
            named: "authorization"
        - propagate:
            named: "cookie"
        - propagate:
            named: "X-User-ID"
        - propagate:
            named: "X-Email"
        - propagate:
            named: "X-Roles"
        - propagate:
            named: "X-Is-Active"
        - insert:
            name: "X-Gateway"
            value: "graphql-gateway"
        - insert:
            name: "X-Client-IP"
            from_context: "apollo_client_ip"
        - propagate:
            named: "user-agent"
            rename: "X-User-Agent"
# OpenTelemetry configuration
telemetry:
  instrumentation:
    spans:
      mode: spec_compliant
  exporters:
    tracing:
      otlp:
        enabled: true
        endpoint: otel-collector:4317
        protocol: grpc
        batch_processor:
          timeout: 5s
          max_export_batch_size: 512
          max_concurrent_exports: 1
          max_queue_size: 2048
    metrics:
      prometheus:
        enabled: true
        listen: 0.0.0.0:9091
        path: /metrics
# Health check endpoint
health_check:
  enabled: true
  listen: 0.0.0.0:4088
  path: /health
# Limits and timeouts
traffic_shaping:
  router:
    timeout: 30s
    global_rate_limit:
      capacity: 1000
      interval: 1s
  all:
    deduplicate_query: true
    timeout: 5s
  # Per-subgraph configuration for graceful degradation
  subgraphs:
    auth-service:
      timeout: 10s
    chat-service:
      timeout: 5s
    notification-service:
      timeout: 5s
    order-service:
      timeout: 5s
    cart-service:
      timeout: 5s
    payment-service:
      timeout: 5s
# Include subgraph errors for debugging (disable in production)
include_subgraph_errors:
  all: true
