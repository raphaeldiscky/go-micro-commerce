<!DOCTYPE html>
<html>
  <head>
    <title>WebSocket Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      #status {
        font-weight: bold;
        margin: 10px 0;
      }
      #messages {
        border: 1px solid #ccc;
        height: 300px;
        overflow-y: auto;
        padding: 10px;
        background: #f9f9f9;
      }
      .message {
        margin: 5px 0;
        padding: 5px;
        background: white;
        border-radius: 3px;
      }
      .system {
        background: #e3f2fd;
      }
      .error {
        background: #ffebee;
      }
      button {
        margin: 5px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Disconnected</div>
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <button onclick="sendTestMessage()">Send Test Message</button>
    <div id="messages"></div>

    <script>
      let ws = null;
      const token =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhdXRoLXNlcnZpY2UiLCJleHAiOjE3NTg3MTUyMTksImlhdCI6MTc1ODYyODgxOSwidXNlcl9pZCI6ImRiODhlMDEzLTcwMjAtNGE5OS04ZjNlLTJhNTZlZDYxYzhkZCIsImVtYWlsIjoicmFwaGFlbC5kaXNja3lAZ21haWwuY29tIiwicm9sZXMiOlsidXNlciJdLCJpc19hY3RpdmUiOnRydWV9.DJWAd_7DKSLRV_mQuI_OhEsBwUzp1keBy8ppS4gbE2g";
      const wsUrl = `ws://localhost:8080/chats/v1/ws?token=${token}`;

      const statusDiv = document.getElementById("status");
      const messagesDiv = document.getElementById("messages");

      function log(message, type = "info") {
        console.log(message);
        const div = document.createElement("div");
        div.className = `message ${type}`;
        div.textContent = new Date().toLocaleTimeString() + ": " + message;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          log("Already connected", "info");
          return;
        }

        statusDiv.textContent = "Connecting...";
        statusDiv.style.color = "orange";
        log("Attempting to connect to: " + wsUrl);

        try {
          ws = new WebSocket(wsUrl);

          ws.onopen = function (event) {
            statusDiv.textContent = "Connected";
            statusDiv.style.color = "green";
            log("WebSocket connection opened successfully!", "system");
          };

          ws.onmessage = function (event) {
            log("Received: " + event.data, "system");
            try {
              const message = JSON.parse(event.data);
              log(
                `Message Type: ${message.type}, Content: ${JSON.stringify(
                  message.content
                )}`,
                "system"
              );
            } catch (e) {
              log("Failed to parse message as JSON", "error");
            }
          };

          ws.onclose = function (event) {
            statusDiv.textContent = "Disconnected";
            statusDiv.style.color = "red";
            log(
              `Connection closed: Code ${event.code}, Reason: ${event.reason}`,
              "error"
            );
          };

          ws.onerror = function (error) {
            statusDiv.textContent = "Error occurred";
            statusDiv.style.color = "red";
            log("WebSocket error occurred", "error");
            console.error("WebSocket error:", error);
          };
        } catch (error) {
          statusDiv.textContent = "Failed to connect";
          statusDiv.style.color = "red";
          log("Failed to create WebSocket: " + error.message, "error");
        }
      }

      function disconnect() {
        if (ws) {
          ws.close();
          ws = null;
        }
      }

      function sendTestMessage() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log("Not connected", "error");
          return;
        }

        const testMessage = {
          type: "chat",
          content: {
            text: "Hello, this is a test message!",
            message_type: "text",
          },
        };

        try {
          ws.send(JSON.stringify(testMessage));
          log("Sent test message", "info");
        } catch (error) {
          log("Failed to send message: " + error.message, "error");
        }
      }

      // Auto-connect when page loads
      window.onload = function () {
        log("Page loaded, attempting auto-connect...");
        connect();
      };
    </script>
  </body>
</html>
