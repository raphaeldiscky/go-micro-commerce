version: '3'
dotenv: ['.env']
vars:
  CURDIR: '{{.PWD}}'
tasks:
  build:
    desc: Build the application binary
    cmds:
      - pnpm run build
  run:
    desc: Run the application
    cmds:
      - pnpm run dev
  lint:
    desc: Run linters
    cmds:
      - pnpm run lint
  knip:
    desc: Run knip
    cmds:
      - pnpm knip
  format:
    desc: Run formatters
    cmds:
      - pnpm run format
  test:
    desc: Run tests with verbose output and coverage
    cmds:
      - pnpm run test
  codegen:
    desc: Generate graphql types
    cmds:
      - pnpm run codegen
  mkcert:
    desc: Generate custom ssl proxy for custom domain
    cmds:
      - mkcert -install
      - mkcert go.micro.commerce
