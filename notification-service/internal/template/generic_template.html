<!DOCTYPE html>
<html>
  <head>
    <title>{{.Subject}}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #f8f9fa;
        padding: 20px;
        text-align: center;
      }
      .order-details {
        margin: 20px 0;
      }
      .total-section {
        background-color: #f8f9fa;
        padding: 15px;
        margin: 20px 0;
      }
      .footer {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>{{.Subject}}</h1>
    </div>

    <div class="order-details">
      <h2>Message Details</h2>
      <p>Dear {{.RecipientName}},</p>
      
      {{if .Data}}
      <div class="total-section">
        <h3>Details</h3>
        {{range $key, $value := .Data}}
        <p><strong>{{$key}}:</strong> {{$value}}</p>
        {{end}}
      </div>
      {{end}}
      
      <p>Thank you!</p>
    </div>

    <div class="footer">
      <p>We appreciate your business!</p>
      <p>
        If you have any questions, please contact our customer service.
      </p>
    </div>
  </body>
</html>
