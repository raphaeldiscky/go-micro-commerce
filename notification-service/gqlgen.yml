schema:
  - graph/schema/*.graphql

exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/models_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: graph/resolver
  package: resolver
  filename_template: "{name}.resolvers.go"

# Enable Apollo Federation v2
federation:
  filename: graph/federation.go
  package: graph
  version: 2

# Custom directive implementations
directives:
  requiresAuth:
    skip_runtime: false
  requiresRole:
    skip_runtime: false

# Autobind existing types
autobind:
  - "github.com/raphaeldiscky/go-micro-commerce/notification-service/internal/constant"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time

  # Map enum to existing constant
  NotificationType:
    model: github.com/raphaeldiscky/go-micro-commerce/notification-service/internal/constant.NotificationType

skip_mod_tidy: true
