# Yamllint configuration
# https://yamllint.readthedocs.io/

extends: default

ignore: |
  node_modules/
  vendor/
  .git/
  **/charts/
  **/.terraform/
  **/.golangci.yml

rules:
  # Allow long lines for K8s manifests and base64 encoded values
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true

  # Standard 2-space indentation
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

  # Allow multiple documents in a file (common in K8s)
  document-start: disable

  # Allow comments without space after # for disabled code
  comments:
    require-starting-space: true
    ignore-shebangs: true
    min-spaces-from-content: 1

  # Truthy values
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  # Empty lines
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1

  # Brackets and braces
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
