version: "3.8"

services:
  # Traefik API Gateway
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=admin@example.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--ping=true"
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deployments/traefik/letsencrypt:/letsencrypt
      - ./deployments/traefik/config:/etc/traefik/dynamic:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Product Service
  product-service:
    build:
      context: ./services/product-service
    environment:
      - DB_HOST=product-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=marketplace_products
      - DB_SSL_MODE=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=product-events
      - HTTP_PORT=8080
    depends_on:
      - product-db
      - kafka
    labels:
      - "traefik.enable=true"
      # HTTP Router
      - "traefik.http.routers.product-service.rule=Host(`api.localhost`) && PathPrefix(`/api/v1/products`)"
      - "traefik.http.routers.product-service.entrypoints=web"
      - "traefik.http.services.product-service.loadbalancer.server.port=8080"
      # Health check route
      - "traefik.http.routers.product-health.rule=Host(`api.localhost`) && Path(`/products/health`)"
      - "traefik.http.routers.product-health.entrypoints=web"
      # Middleware for path stripping
      - "traefik.http.middlewares.product-stripprefix.stripprefix.prefixes=/api/v1/products"
      - "traefik.http.routers.product-service.middlewares=product-stripprefix"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Seller Service
  seller-service:
    build:
      context: ./services/seller-service
    environment:
      - DB_HOST=seller-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=marketplace_sellers
      - DB_SSL_MODE=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=seller-events
      - HTTP_PORT=8081
    depends_on:
      - seller-db
      - kafka
    labels:
      - "traefik.enable=true"
      # HTTP Router
      - "traefik.http.routers.seller-service.rule=Host(`api.localhost`) && PathPrefix(`/api/v1/sellers`)"
      - "traefik.http.routers.seller-service.entrypoints=web"
      - "traefik.http.services.seller-service.loadbalancer.server.port=8081"
      # Health check route
      - "traefik.http.routers.seller-health.rule=Host(`api.localhost`) && Path(`/sellers/health`)"
      - "traefik.http.routers.seller-health.entrypoints=web"
      # Middleware for path stripping
      - "traefik.http.middlewares.seller-stripprefix.stripprefix.prefixes=/api/v1/sellers"
      - "traefik.http.routers.seller-service.middlewares=seller-stripprefix"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Marketplace Aggregation Service (optional - for aggregated endpoints)
  marketplace-service:
    build:
      context: ./services/marketplace-service
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8080
      - SELLER_SERVICE_URL=http://seller-service:8081
      - HTTP_PORT=8082
    depends_on:
      - product-service
      - seller-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marketplace-service.rule=Host(`api.localhost`) && PathPrefix(`/api/v1/marketplace`)"
      - "traefik.http.routers.marketplace-service.entrypoints=web"
      - "traefik.http.services.marketplace-service.loadbalancer.server.port=8082"
      - "traefik.http.middlewares.marketplace-stripprefix.stripprefix.prefixes=/api/v1/marketplace"
      - "traefik.http.routers.marketplace-service.middlewares=marketplace-stripprefix"
    networks:
      - microservices
    restart: unless-stopped

  # Product Database
  product-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketplace_products
    ports:
      - "5432:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Seller Database
  seller-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketplace_sellers
    ports:
      - "5433:5432"
    volumes:
      - seller_db_data:/var/lib/postgresql/data
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Kafka UI (for monitoring)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kafka-ui.rule=Host(`kafka.localhost`)"
      - "traefik.http.routers.kafka-ui.entrypoints=web"
      - "traefik.http.services.kafka-ui.loadbalancer.server.port=8080"
    networks:
      - microservices
    restart: unless-stopped

  # Prometheus (for metrics)
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    networks:
      - microservices
    restart: unless-stopped

  # Grafana (for dashboards)
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - microservices
    restart: unless-stopped

volumes:
  product_db_data:
  seller_db_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  microservices:
    driver: bridge
