# Message entity (owned by chat-service)
type Message @key(fields: "id") {
  id: ID!
  conversationId: ID!
  conversation: Conversation!
  senderId: ID
  sender: User
  content: String!
  messageType: MessageType!
  isSystem: Boolean!
  createdAt: Time!
}

# Message type enum
enum MessageType {
  TEXT
  IMAGE
  FILE
  SYSTEM
}

# Cursor-based pagination for messages
type MessageConnection {
  edges: [MessageEdge!]!
  pageInfo: PageInfo!
}

type MessageEdge {
  cursor: String!
  node: Message!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Message queries
extend type Query {
  # Get messages for a conversation with cursor-based pagination
  conversationMessages(
    conversationId: ID!
    first: Int
    after: String
    last: Int
    before: String
  ): MessageConnection!
}