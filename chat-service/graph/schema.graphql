# Apollo Federation v2 directives
directive @key(fields: String!, resolvable: Boolean = true) repeatable on OBJECT | INTERFACE
directive @extends on OBJECT | INTERFACE
directive @external on OBJECT | FIELD_DEFINITION
directive @requires(fields: String!) on FIELD_DEFINITION
directive @provides(fields: String!) on FIELD_DEFINITION
directive @shareable on OBJECT | FIELD_DEFINITION
directive @inaccessible on FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ARGUMENT_DEFINITION | SCALAR | ENUM | ENUM_VALUE | INPUT_OBJECT | INPUT_FIELD_DEFINITION
directive @tag(name: String!) repeatable on FIELD_DEFINITION | INTERFACE | OBJECT | UNION | ARGUMENT_DEFINITION | SCALAR | ENUM | ENUM_VALUE | INPUT_OBJECT | INPUT_FIELD_DEFINITION
directive @override(from: String!) on FIELD_DEFINITION

# Scalars
scalar Time

# Extend User entity from auth-service (we reference it but don't own it)
extend type User @key(fields: "id") {
  id: ID! @external
  conversations: [Conversation!]!
  onlineStatus: OnlineStatus
}

# Conversation entity (owned by chat-service)
type Conversation @key(fields: "id") {
  id: ID!
  subject: String
  status: ConversationStatus!
  priority: Int!
  participants: [Participant!]!
  messages(limit: Int = 50, offset: Int = 0): MessageConnection!
  createdAt: Time!
  updatedAt: Time!
  endedAt: Time
}

# Message entity (owned by chat-service)
type Message @key(fields: "id") {
  id: ID!
  conversationId: ID!
  conversation: Conversation!
  senderId: ID
  sender: User
  content: String!
  messageType: MessageType!
  isSystem: Boolean!
  createdAt: Time!
}

# Participant entity (owned by chat-service)
type Participant {
  id: ID!
  conversationId: ID!
  conversation: Conversation!
  userId: ID!
  user: User!
  userType: UserType!
  role: ParticipantRole!
  joinedAt: Time!
  leftAt: Time
  isActive: Boolean!
}

# Online status for users
type OnlineStatus {
  isOnline: Boolean!
  lastSeen: Time
}

# Pagination for messages
type MessageConnection {
  items: [Message!]!
  pagination: OffsetPagination!
}

type OffsetPagination {
  totalItems: Int!
  totalPages: Int!
  currentPage: Int!
  pageSize: Int!
  hasNext: Boolean!
  hasPrev: Boolean!
}

# Enums
enum ConversationStatus {
  WAITING
  ACTIVE
  ENDED
}

enum MessageType {
  TEXT
  IMAGE
  FILE
  SYSTEM
}

enum UserType {
  USER
  ADMIN
}

enum ParticipantRole {
  MEMBER
  OWNER
  MODERATOR
}

# Inputs
input CreateConversationInput {
  subject: String
  priority: Int!
  initialMessage: String
}

input JoinConversationInput {
  conversationId: ID!
  role: ParticipantRole!
}

# Queries
type Query {
  # Get single conversation
  conversation(id: ID!): Conversation

  # Get user's conversations
  conversations: [Conversation!]!

  # Get messages for a conversation
  conversationMessages(conversationId: ID!, limit: Int = 50, offset: Int = 0): MessageConnection!

  # Get participants of a conversation
  conversationParticipants(conversationId: ID!): [Participant!]!

  # Admin: Get waiting conversations
  waitingConversations: [Conversation!]!

  # Get online users
  onlineUsers: [User!]!
}

# Mutations
type Mutation {
  # Create new conversation
  createConversation(input: CreateConversationInput!): Conversation!

  # Join conversation
  joinConversation(input: JoinConversationInput!): Participant!

  # Leave conversation
  leaveConversation(conversationId: ID!): Boolean!

  # End conversation (admin only)
  endConversation(conversationId: ID!): Conversation!

  # Assign conversation to admin
  assignConversationToAdmin(conversationId: ID!, adminId: ID!): Conversation!
}
