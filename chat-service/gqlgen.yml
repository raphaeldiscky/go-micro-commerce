schema:
  - graphql/schema/*.graphql

exec:
  filename: graphql/generated/generated.go
  package: generated

model:
  filename: graphql/generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: graphql/resolver
  package: resolver
  filename_template: "{name}.resolvers.go"

# Enable Apollo Federation v2
federation:
  version: 2

# Autobind existing types
autobind:
  - "github.com/raphaeldiscky/go-micro-commerce/chat-service/internal/constant"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time

  # Map enums to existing constants
  ConversationStatus:
    model: github.com/raphaeldiscky/go-micro-commerce/chat-service/internal/constant.ConversationStatus
  MessageType:
    model: github.com/raphaeldiscky/go-micro-commerce/chat-service/internal/constant.MessageType
  UserType:
    model: github.com/raphaeldiscky/go-micro-commerce/chat-service/internal/constant.UserType
  ParticipantRole:
    model: github.com/raphaeldiscky/go-micro-commerce/chat-service/internal/constant.ParticipantRole
