conversation-participants:
  get:
    tags:
      - Participants
    summary: Get conversation participants
    description: Retrieve all participants in a conversation
    operationId: getParticipants
    parameters:
      - name: conversationID
        in: path
        required: true
        description: UUID of the conversation
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Participants retrieved successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/participant.yaml#/ParticipantResponse"
      "400":
        $ref: "../schemas/responses.yaml#/BadRequestError"
      "401":
        $ref: "../schemas/responses.yaml#/UnauthorizedError"
      "404":
        $ref: "../schemas/responses.yaml#/NotFoundError"
      "500":
        $ref: "../schemas/responses.yaml#/InternalServerError"
