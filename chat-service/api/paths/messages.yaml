conversation-messages:
  get:
    tags:
      - Messages
    summary: Get conversation messages
    description: Retrieve messages from a conversation with pagination
    operationId: getMessages
    parameters:
      - name: conversationID
        in: path
        required: true
        description: UUID of the conversation
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        description: Page number (1-based)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        description: Number of messages per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
    responses:
      "200":
        description: Messages retrieved successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/responses.yaml#/PaginatedMessageResponse"
      "400":
        $ref: "../schemas/responses.yaml#/BadRequestError"
      "401":
        $ref: "../schemas/responses.yaml#/UnauthorizedError"
      "404":
        $ref: "../schemas/responses.yaml#/NotFoundError"
      "500":
        $ref: "../schemas/responses.yaml#/InternalServerError"
