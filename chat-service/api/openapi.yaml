openapi: 3.0.3
info:
  title: Chat Service API
  description: Real-time chat service with WebSocket support for an e-commerce platform
  version: 1.0.0
  contact:
    name: Chat Service Team
    email: support@example.com

servers:
  - url: http://localhost:8083/v1
    description: Local development server
  - url: https://api.example.com/chat/v1
    description: Production server

security:
  - BearerAuth: []

paths:
  # Connection management
  /connect:
    $ref: "./paths/connection.yaml#/connect"
  /nodes/health:
    $ref: "./paths/connection.yaml#/nodes-health"
  /validate-ticket:
    $ref: "./paths/connection.yaml#/validate-ticket"

  # Conversation management
  /conversations:
    $ref: "./paths/conversations.yaml#/conversations"
  /{conversationID}:
    $ref: "./paths/conversations.yaml#/conversation-by-id"
  /{conversationID}/join:
    $ref: "./paths/conversations.yaml#/join-conversation"

  # Message management
  /{conversationID}/messages:
    $ref: "./paths/messages.yaml#/conversation-messages"

  # Participant management
  /{conversationID}/participants:
    $ref: "./paths/participants.yaml#/conversation-participants"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Core entities
    ConversationResponse:
      $ref: "./schemas/conversation.yaml#/ConversationResponse"
    MessageResponse:
      $ref: "./schemas/message.yaml#/MessageResponse"
    ParticipantResponse:
      $ref: "./schemas/participant.yaml#/ParticipantResponse"

    # Connection schemas
    ConnectionRequest:
      $ref: "./schemas/connection.yaml#/ConnectionRequest"
    ChatConnectionResponse:
      $ref: "./schemas/connection.yaml#/ChatConnectionResponse"
    NodeHealthResponse:
      $ref: "./schemas/connection.yaml#/NodeHealthResponse"
    ConnectionTicketClaims:
      $ref: "./schemas/connection.yaml#/ConnectionTicketClaims"

    # Request schemas
    CreateConversationRequest:
      $ref: "./schemas/conversation.yaml#/CreateConversationRequest"

    # Response schemas
    PaginatedMessageResponse:
      $ref: "./schemas/responses.yaml#/PaginatedMessageResponse"
    OffsetPagination:
      $ref: "./schemas/responses.yaml#/OffsetPagination"
    ErrorResponse:
      $ref: "./schemas/responses.yaml#/ErrorResponse"

    # Enums
    UserType:
      $ref: "./schemas/enums.yaml#/UserType"
    ConversationStatus:
      $ref: "./schemas/enums.yaml#/ConversationStatus"
    ParticipantRole:
      $ref: "./schemas/enums.yaml#/ParticipantRole"
    MessageType:
      $ref: "./schemas/enums.yaml#/MessageType"

  responses:
    BadRequestError:
      $ref: "./schemas/responses.yaml#/BadRequestError"
    UnauthorizedError:
      $ref: "./schemas/responses.yaml#/UnauthorizedError"
    NotFoundError:
      $ref: "./schemas/responses.yaml#/NotFoundError"
    ConflictError:
      $ref: "./schemas/responses.yaml#/ConflictError"
    InternalServerError:
      $ref: "./schemas/responses.yaml#/InternalServerError"
