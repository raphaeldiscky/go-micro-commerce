ConnectionRequest:
  type: object
  properties:
    user_agent:
      type: string
      description: Client user agent string
    client_ip:
      type: string
      description: Client IP address

ChatConnectionResponse:
  type: object
  required:
    - node_address
    - ticket
    - expires_at
    - user_id
    - user_type
  properties:
    node_address:
      type: string
      description: WebSocket server address
    ticket:
      type: string
      description: JWT connection ticket
    expires_at:
      type: string
      format: date-time
      description: Ticket expiration time
    user_id:
      type: string
      format: uuid
      description: User ID
    user_type:
      $ref: "./enums.yaml#/UserType"

NodeHealthResponse:
  type: object
  required:
    - node_id
    - address
    - status
    - connections
    - max_connections
    - last_seen
  properties:
    node_id:
      type: string
      description: Unique node identifier
    address:
      type: string
      description: Node network address
    status:
      type: string
      enum: [healthy, unhealthy, unknown]
      description: Node health status
    connections:
      type: integer
      description: Current connection count
    max_connections:
      type: integer
      description: Maximum connection capacity
    last_seen:
      type: string
      format: date-time
      description: Last health check timestamp

ConnectionTicketClaims:
  type: object
  required:
    - user_id
    - user_type
  properties:
    user_id:
      type: string
      format: uuid
      description: User ID from JWT claims
    user_type:
      $ref: "./enums.yaml#/UserType"
    iss:
      type: string
      description: JWT issuer
    exp:
      type: integer
      description: JWT expiration timestamp
    iat:
      type: integer
      description: JWT issued at timestamp
