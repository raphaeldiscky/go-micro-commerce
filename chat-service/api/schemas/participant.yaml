ParticipantResponse:
  type: object
  required:
    - id
    - conversation_id
    - user_id
    - user_type
    - role
    - joined_at
    - is_active
  properties:
    id:
      type: string
      format: uuid
      description: Participant ID
    conversation_id:
      type: string
      format: uuid
      description: Parent conversation ID
    user_id:
      type: string
      format: uuid
      description: User ID
    user_type:
      $ref: "./enums.yaml#/UserType"
    role:
      $ref: "./enums.yaml#/ParticipantRole"
    joined_at:
      type: string
      format: date-time
      description: Join timestamp
    left_at:
      type: string
      format: date-time
      nullable: true
      description: Leave timestamp
    is_active:
      type: boolean
      description: Whether participant is active
