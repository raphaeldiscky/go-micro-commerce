PaginatedMessageResponse:
  type: object
  required:
    - data
    - pagination
  properties:
    data:
      type: array
      items:
        $ref: "./message.yaml#/MessageResponse"
    pagination:
      $ref: "#/OffsetPagination"

OffsetPagination:
  type: object
  required:
    - total
    - page
    - per_page
    - total_pages
    - has_next
    - has_prev
  properties:
    total:
      type: integer
      format: int64
      description: Total number of items
    page:
      type: integer
      description: Current page number (1-based)
    per_page:
      type: integer
      description: Items per page
    total_pages:
      type: integer
      description: Total number of pages
    has_next:
      type: boolean
      description: Whether there is a next page
    has_prev:
      type: boolean
      description: Whether there is a previous page

ErrorResponse:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      description: Error message
    errors:
      type: array
      items:
        type: object
        properties:
          field:
            type: string
            description: Field name that caused the error
          message:
            type: string
            description: Field-specific error message

BadRequestError:
  description: Bad request - invalid input parameters
  content:
    application/json:
      schema:
        $ref: "#/ErrorResponse"

UnauthorizedError:
  description: Unauthorized - authentication required
  content:
    application/json:
      schema:
        $ref: "#/ErrorResponse"

NotFoundError:
  description: Resource not found
  content:
    application/json:
      schema:
        $ref: "#/ErrorResponse"

ConflictError:
  description: Conflict - resource already exists or operation conflicts with current state
  content:
    application/json:
      schema:
        $ref: "#/ErrorResponse"

InternalServerError:
  description: Internal server error
  content:
    application/json:
      schema:
        $ref: "#/ErrorResponse"
