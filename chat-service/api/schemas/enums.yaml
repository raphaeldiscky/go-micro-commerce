UserType:
  type: string
  enum:
    - user
    - admin
  description: Type of user in the system

ConversationStatus:
  type: string
  enum:
    - waiting
    - active
    - resolved
    - closed
  description: Current status of the conversation

ParticipantRole:
  type: string
  enum:
    - participant
    - moderator
  description: Role of participant in conversation

MessageType:
  type: string
  enum:
    - text
    - image
    - file
    - system
  description: Type of message content
