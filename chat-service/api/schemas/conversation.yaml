CreateConversationRequest:
  type: object
  required:
    - priority
  properties:
    subject:
      type: string
      maxLength: 255
      description: Optional conversation subject
    priority:
      type: integer
      minimum: 1
      maximum: 4
      description: Conversation priority (1=Low, 2=Normal, 3=High, 4=Urgent)

ConversationResponse:
  type: object
  required:
    - id
    - status
    - priority
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
      description: Conversation ID
    status:
      $ref: "./enums.yaml#/ConversationStatus"
    subject:
      type: string
      nullable: true
      description: Optional conversation subject
    priority:
      type: integer
      minimum: 1
      maximum: 4
      description: Conversation priority
    metadata:
      type: object
      additionalProperties: true
      description: Additional conversation metadata
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp
    ended_at:
      type: string
      format: date-time
      nullable: true
      description: Conversation end timestamp
