syntax = "proto3";

package product.v1;

option go_package = "github.com/raphaeldiscky/go-micro-commerce/proto/product/v1;productv1";

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// Product service definition
service ProductService {
  // ListProducts returns a list of products
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  // BatchGetProductsByIDs retrieves products by their IDs
  rpc BatchGetProductsByIDs(BatchGetProductsByIDsRequest) returns (BatchGetProductsByIDsResponse);
  // ReserveProducts reduce quantity initially and adds reserved_quantity
  rpc ReserveProducts(ReserveProductsRequest) returns (ReserveProductsResponse);
  // ReleaseProducts re-add quantity and remove reserved_quantity
  rpc ReleaseProducts(ReleaseProductsRequest) returns (ReleaseProductsResponse);
  // ConfirmProductsDeduction confirm quantity and remove reserved_quantity
  rpc ConfirmProductsDeduction(ConfirmProductsDeductionRequest) returns (ConfirmProductsDeductionResponse);
  // RestoreProducts restore quantity
  rpc RestoreProducts(RestoreProductsRequest) returns (RestoreProductsResponse);
  // ValidateProducts validate products before place order if price not changed and stock still available
  rpc ValidateProducts(ValidateProductsRequest) returns (ValidateProductsResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ListProductsRequest {
  optional string limit = 1 [(buf.validate.field).string = {
    max_len: 3
  }];
  optional string next_cursor = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  CursorPagination pagination = 2;
}

message CursorPagination {
  optional string next_cursor = 1;
  optional string prev_cursor = 2;
  bool has_next = 3;
  bool has_prev = 4;
}

message BatchGetProductsByIDsRequest {
  repeated string ids = 1 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.max_items = 100,
    (buf.validate.field).repeated.items.string.uuid = true
  ]; 
}
message BatchGetProductsByIDsResponse {
  repeated Product products = 1;
  string message = 2;
}

message ReserveProductsRequest {
  string idempotency_key = 1 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
  repeated ProductQuantityWithVersion items = 2 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 50
  }];
}

message ProductQuantityWithVersion {
  string product_id = 1 [(buf.validate.field).string.uuid = true];
  int64 quantity = 2 [(buf.validate.field).int64 = {
    gt: 0
  }];
  int64 version = 3 [(buf.validate.field).int64.gte = 0]; // for optimistic locking
}

message ProductQuantity {
  string product_id = 1 [(buf.validate.field).string.uuid = true];
  int64 quantity = 2 [(buf.validate.field).int64 = {
    gt: 0
  }];
}

message ReserveProductsResponse {
  bool success = 1;
  repeated Product reserved_products = 2;
  string message = 3;
}

message Product {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
  double price = 3 [(buf.validate.field).double = {
    gt: 0
  }];
  int64 quantity = 4 [(buf.validate.field).int64.gte = 0];
  int64 version = 5 [(buf.validate.field).int64.gte = 0]; // for optimistic locking
  int64 reserved_quantity = 6 [(buf.validate.field).int64.gte = 0]; // quantity reserved for orders
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ReleaseProductsRequest {
  repeated ProductQuantity items = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 50
  }];
}

message ReleaseProductsResponse {
  bool success = 1;
  string message = 2;
}

message ConfirmProductsDeductionRequest {
  repeated ProductQuantity items = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 50
  }];
}

message ConfirmProductsDeductionResponse {
  bool success = 1;
  repeated Product updated_products = 2;
  string message = 3;
}

message RestoreProductsRequest {
  repeated ProductQuantity items = 1 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 50
  }];
  string reason = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }]; // reason for restoration (e.g., "order_cancelled", "payment_failed")
}

message RestoreProductsResponse {
  bool success = 1;
  repeated Product restored_products = 2;
  string message = 3;
}

message ValidateProductsRequest {
  repeated ProductForValidation products = 1;
}

message ValidateProductsResponse {
  bool success = 1; // true if all products are valid
  repeated Product products = 2;
  string message = 3;
}


message ProductForValidation {
  string id = 1 [(buf.validate.field).string.uuid = true];
  double price = 2 [(buf.validate.field).double = {
    gt: 0
  }];
  int64 quantity = 3 [(buf.validate.field).int64.gte = 0];
}


message HealthRequest {}

message HealthResponse {
  HealthStatus status = 1; // e.g., "SERVING"
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_SERVING = 1;
  HEALTH_STATUS_NOT_SERVING = 2;
}