syntax = "proto3";

package chat.connection.v1;

option go_package = "github.com/raphaeldiscky/go-micro-commerce/proto/chat/connection/v1;connectionv1";

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// ConnectionService handles WebSocket connection management and authentication
service ConnectionService {
  // RequestConnection requests a WebSocket connection ticket/token
  rpc RequestConnection(RequestConnectionRequest) returns (RequestConnectionResponse);
  // ValidateTicket validates a connection ticket for WebSocket handshake
  rpc ValidateTicket(ValidateTicketRequest) returns (ValidateTicketResponse);
  // GetNodeHealth returns health status of available chat nodes
  rpc GetNodeHealth(GetNodeHealthRequest) returns (GetNodeHealthResponse);
}

// RequestConnectionRequest represents the request to establish a WebSocket connection
message RequestConnectionRequest {
  string user_agent = 1 [(buf.validate.field).string = {
    max_len: 255
  }];
  string client_ip = 2 [(buf.validate.field).string = {
    max_len: 45
  }];
}

// RequestConnectionResponse represents the response for connection establishment
message RequestConnectionResponse {
  string node_address = 1 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
  string ticket = 2 [(buf.validate.field).string = {
    min_len: 1
  }];
  google.protobuf.Timestamp expires_at = 3;
  string user_id = 4 [(buf.validate.field).string.uuid = true];
  UserType user_type = 5;
}

// ValidateTicketRequest represents the request to validate a connection ticket
message ValidateTicketRequest {
  string ticket = 1 [(buf.validate.field).string = {
    min_len: 1
  }];
}

// ValidateTicketResponse represents the response for ticket validation
message ValidateTicketResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  UserType user_type = 2;
  google.protobuf.Timestamp expires_at = 3;
  bool is_valid = 4;
}

// GetNodeHealthRequest represents the request to get node health status
message GetNodeHealthRequest {}

// GetNodeHealthResponse represents the response for node health status
message GetNodeHealthResponse {
  repeated NodeHealth nodes = 1;
  int32 count = 2;
}

// NodeHealth represents the health status of a chat node
message NodeHealth {
  string node_id = 1 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
  string address = 2 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
  string status = 3 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 50
  }];
  int32 connections = 4 [(buf.validate.field).int32.gte = 0];
  int32 max_connections = 5 [(buf.validate.field).int32.gte = 0];
  google.protobuf.Timestamp last_seen = 6;
}

// UserType represents the type of user in the chat system
enum UserType {
  USER_TYPE_UNSPECIFIED = 0;
  USER_TYPE_USER = 1;    // Regular user/customer
  USER_TYPE_ADMIN = 2;   // Admin/support agent
}