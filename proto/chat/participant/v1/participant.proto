syntax = "proto3";

package chat.participant.v1;

option go_package = "github.com/raphaeldiscky/go-micro-commerce/proto/chat/participant/v1;participantv1";

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// ParticipantService handles participant data operations (read-only)
service ParticipantService {
  // GetParticipant retrieves a participant by ID
  rpc GetParticipant(GetParticipantRequest) returns (GetParticipantResponse);
  // GetParticipantsByConversation retrieves all participants in a conversation
  rpc GetParticipantsByConversation(GetParticipantsByConversationRequest) returns (GetParticipantsByConversationResponse);
}

// GetParticipantRequest represents the request to get a participant
message GetParticipantRequest {
  string participant_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetParticipantResponse represents the response for getting a participant
message GetParticipantResponse {
  Participant participant = 1;
}

// GetParticipantsByConversationRequest represents the request to get participants by conversation
message GetParticipantsByConversationRequest {
  string conversation_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetParticipantsByConversationResponse represents the response for getting participants by conversation
message GetParticipantsByConversationResponse {
  repeated Participant participants = 1;
}

// Participant represents a conversation participant
message Participant {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string conversation_id = 2 [(buf.validate.field).string.uuid = true];
  string user_id = 3 [(buf.validate.field).string.uuid = true];
  UserType user_type = 4;
  ParticipantRole role = 5;
  google.protobuf.Timestamp joined_at = 6;
  optional google.protobuf.Timestamp left_at = 7;
  bool is_active = 8;
}

// UserType represents the type of user in the chat system
enum UserType {
  USER_TYPE_UNSPECIFIED = 0;
  USER_TYPE_USER = 1;    // Regular user/customer
  USER_TYPE_ADMIN = 2;   // Admin/support agent
}

// ParticipantRole represents the role of a participant in a conversation
enum ParticipantRole {
  PARTICIPANT_ROLE_UNSPECIFIED = 0;
  PARTICIPANT_ROLE_PARTICIPANT = 1;  // Regular participant
  PARTICIPANT_ROLE_MODERATOR = 2;    // Moderator with elevated permissions
  PARTICIPANT_ROLE_OBSERVER = 3;     // Observer with read-only access
}