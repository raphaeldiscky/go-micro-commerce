syntax = "proto3";

package fulfillment.v1;

option go_package = "github.com/raphaeldiscky/go-micro-commerce/proto/fulfillment/v1;fulfillmentv1";


import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

service FulfillmentService {
  rpc GetShippingCost(GetShippingCostRequest) returns (GetShippingCostResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message GetShippingCostRequest {
  string currency = 1 [(buf.validate.field).string = {
    min_len: 3,
    max_len: 3
  }];
  Courier courier = 2;
  Destination destination = 3;
  Origin origin = 4;
  Package package = 5;
}

message GetShippingCostResponse {
  bool success = 1;
  double shipping_cost = 2;
  string currency = 3;
  string error_message = 4;
}

message Courier {
  string courier_id = 1 [(buf.validate.field).string.uuid = true];
}

message Package {
  string weight_kg = 1 [(buf.validate.field).string = {
    pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
  }];
  string width = 2 [(buf.validate.field).string = {
    pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
  }];
  string height = 3 [(buf.validate.field).string = {
    pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
  }];
  string length = 4 [(buf.validate.field).string = {
    pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
  }];
  string unit = 5 [(buf.validate.field).string = {
    min_len: 1,
    max_len: 255
  }];
}

//  Customer address
message Destination {
  string city = 1;
  string state = 2;
  string postal_code = 3;
  string country = 4;
}

// Warehouse address
message Origin {
  string city = 1;
  string state = 2;
  string postal_code = 3;
  string country = 4;
}

message HealthRequest {}

message HealthResponse {
  HealthStatus status = 1; // e.g., "SERVING"
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_SERVING = 1;
  HEALTH_STATUS_NOT_SERVING = 2;
}