# OrderStatus enum
enum OrderStatus {
  PENDING
  PROCESSING
  PAYMENT_PENDING
  PAYMENT_EXPIRED
  PAID
  COMPLETED
  SHIPPED
  DELIVERED
  CANCELED
  FAILED
}

# PaymentGateway enum
enum PaymentGateway {
  STRIPE
}

# Payment type reference from payment-service (Federation)
type Payment @key(fields: "orderId") {
  orderId: UUID!
}

# Courier type
type Courier {
  courierId: String!
}

# Package type
type Package {
  weightKg: Decimal!
  length: Decimal!
  height: Decimal!
  width: Decimal!
  unit: String!
}

# Origin address type
type Origin {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Destination address type
type Destination {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Order entity
type Order {
  id: UUID!
  idempotencyKey: UUID!
  checkoutSessionId: UUID!
  customerId: UUID!
  status: OrderStatus!
  currency: String!
  paymentGateway: PaymentGateway!
  courier: Courier!
  package: Package!
  origin: Origin!
  destination: Destination!
  shippingCost: Decimal!
  subtotal: Decimal!
  totalPrice: Decimal!
  totalTax: Decimal!
  totalDiscount: Decimal!
  items: [OrderItem!]!
  payment: Payment # Payment details from payment-service (includes clientSecret and expiresAt)
  createdAt: Time!
  updatedAt: Time!
}

# OrderItem entity
type OrderItem {
  id: UUID!
  orderId: UUID!
  productId: UUID!
  quantity: Int!
  unitPrice: Decimal!
  totalPrice: Decimal!
  taxRate: Decimal!
  totalTax: Decimal!
  totalDiscount: Decimal!
  createdAt: Time!
  updatedAt: Time!
}

# Order connection for cursor-based pagination
type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
}

# Order edge
type OrderEdge {
  node: Order!
  cursor: String!
}

# Page info for cursor pagination
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Input type for creating order items
input CreateOrderItemInput {
  productId: UUID!
  quantity: Int!
}

# Input type for shipping dimensions
input DimensionsInput {
  length: Decimal!
  height: Decimal!
  width: Decimal!
  unit: String!
}

# Input type for from address
input FromAddressInput {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Input type for to address
input ToAddressInput {
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
}

# Input type for shipping
input ShippingInput {
  carrierId: String!
  fromAddress: FromAddressInput!
  toAddress: ToAddressInput!
  weightKg: Decimal!
  dimensions: DimensionsInput!
}

# Input type for creating a new order
input CreateOrderInput {
  idempotencyKey: UUID!
  items: [CreateOrderItemInput!]!
  shipping: ShippingInput!
  paymentGateway: PaymentGateway!
  currency: String!
}

# Order queries
extend type Query {
  # List all orders with cursor pagination (admin only)
  listOrders(limit: Int!, cursor: String): OrderConnection!
    @requiresRole(role: ADMIN)

  # List authenticated user's orders with cursor pagination
  listMyOrders(limit: Int!, cursor: String): OrderConnection! @requiresAuth
}

# Order mutations
extend type Mutation {
  # Create a new order using saga workflow
  createOrder(input: CreateOrderInput!): Order! @requiresAuth
}
