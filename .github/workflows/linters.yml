name: linters

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.sql"
      - "**/Dockerfile*"
      - "**/*.yaml"
      - "**/*.yml"
      - ".sqlfluff"
      - ".hadolint.yaml"
      - ".yamllint.yaml"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "**/*.sql"
      - "**/Dockerfile*"
      - "**/*.yaml"
      - "**/*.yml"
      - ".sqlfluff"
      - ".hadolint.yaml"
      - ".yamllint.yaml"
      - "scripts/**"

jobs:
  lint:
    name: Run Linters
    runs-on: tenki-standard-autoscale
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        linter: [sqlfluff, hadolint, yamllint]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        if: matrix.linter == 'sqlfluff' || matrix.linter == 'yamllint'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      # Install SQLFluff
      - name: Install SQLFluff
        if: matrix.linter == 'sqlfluff'
        run: pip install sqlfluff

      # Run SQLFluff
      - name: Lint SQL
        if: matrix.linter == 'sqlfluff'
        run: sqlfluff lint

      # Install Hadolint
      - name: Install hadolint
        if: matrix.linter == 'hadolint'
        uses: hadolint/hadolint-action@v3.1.0

      # Run Hadolint
      - name: Lint Dockerfiles
        if: matrix.linter == 'hadolint'
        run: bash ./scripts/hadolint.sh

      # Install yamllint
      - name: Install yamllint
        if: matrix.linter == 'yamllint'
        run: pip install yamllint

      # Run YAMLLint
      - name: Lint YAML
        if: matrix.linter == 'yamllint'
        run: bash ./scripts/yamllint.sh
