name: backend

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  # This job's purpose is to figure out which services need to be built.
  detect-changes:
    runs-on: tenki-standard-autoscale
    outputs:
      # It will output a JSON array of service names that have changed.
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Path Filter to detect changes
        # This action checks which files have changed based on the paths.
        # Each service directory is a key.
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod' 
              - 'go.sum'
            graphql-gateway:
              - 'graphql-gateway/**'
            auth-service:
              - 'auth-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            product-service:
              - 'product-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            order-service:
              - 'order-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            payment-service:
              - 'payment-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            fulfillment-service:
              - 'fulfillment-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            notification-service:
              - 'notification-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            search-service:
              - 'search-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'
            chat-service:
              - 'chat-service/**'
              - 'pkg/**'
              - 'proto/**'
              - 'go.mod'
              - 'go.sum'

  # This job runs for each service that was detected in the previous job.
  build-and-push:
    # It requires 'detect-changes' to finish successfully.
    needs: detect-changes
    # Only run this job if there are actually changed services.
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: tenki-standard-autoscale
    timeout-minutes: 30
    # The 'matrix' strategy creates a parallel job for each service name
    # in the JSON array from the 'detect-changes' job output.
    strategy:
      fail-fast: true
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.7" # Updated to match go.mod requirement

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.service }}-${{ hashFiles(format('{0}/go.sum', matrix.service), 'pkg/go.sum', 'proto/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.service }}-
            ${{ runner.os }}-go-

      - name: Install Tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.4.0
          go install golang.org/x/tools/cmd/deadcode@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check deadcode for ${{ matrix.service }}
        run: bash scripts/deadcode.sh ${{ matrix.service }}

      - name: Run Linter for ${{ matrix.service }}
        run: bash scripts/lint.sh ${{ matrix.service }}

      - name: Run Security Vulnerability Scan for ${{ matrix.service }}
        run: bash scripts/security.sh ${{ matrix.service }}

      - name: Run Tests for ${{ matrix.service }}
        run: bash scripts/test.sh ${{ matrix.service }}

      - name: Upload test coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage
          fail_ci_if_error: false

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.service }}-coverage
          path: |
            ./${{ matrix.service }}/coverage.out
            ./${{ matrix.service }}/coverage.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = []

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/go-micro-commerce/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: . # Use root as context to access pkg directory
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true # Load image locally for security scanning
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ steps.meta.outputs.tags }}
      #     format: "sarif"
      #     output: "trivy-results.sarif"

      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: "trivy-results.sarif"

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## Build Summary for ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ matrix.service }}/coverage.out" ]; then
            COVERAGE=$(go tool cover -func=${{ matrix.service }}/coverage.out | grep total: | awk '{print $3}')
            echo "- **Test Coverage**: $COVERAGE" >> $GITHUB_STEP_SUMMARY
          fi
