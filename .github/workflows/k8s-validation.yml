name: k8s-validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'deployments/k8s/**'
      - 'deployments/helm/**'
      - 'scripts/validate-manifests.sh'
      - 'scripts/validate-charts.sh'
  push:
    branches:
      - main
    paths:
      - 'deployments/k8s/**'
      - 'deployments/helm/**'
      - 'scripts/validate-manifests.sh'
      - 'scripts/validate-charts.sh'

jobs:
  validate-manifests:
    runs-on: tenki-standard-autoscale
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Setup Go (for kubeconform and kube-linter)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"

      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest

      - name: Install kube-linter
        run: go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest

      - name: Setup Helm (for Helm values validation)
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Validate Kubernetes manifests
        run: bash scripts/validate-manifests.sh

      - name: Validate Helm values
        run: bash scripts/validate-charts.sh

      - name: Generate validation summary
        if: always()
        run: |
          echo "## K8s Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation Layers**:" >> $GITHUB_STEP_SUMMARY
          echo "  - Kustomize build (manifests)" >> $GITHUB_STEP_SUMMARY
          echo "  - Helm template (charts)" >> $GITHUB_STEP_SUMMARY
          echo "  - Kubeconform schema validation" >> $GITHUB_STEP_SUMMARY
          echo "  - Kube-linter best practices" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
