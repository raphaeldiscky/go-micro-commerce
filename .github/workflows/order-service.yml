name: Order Service

on:
  push:
    paths:
      - order-service/**
    branches:
      - "main"
  pull_request:
    paths:
      - order-service/**
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/go-micro-template/order-service
  GO_VERSION: "1.21"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install Go Dependencies
        run: task install_tools

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Lint
        run: task lint SERVICE=order-service

      - name: Run tests
        run: task test SERVICE=order-service

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$TAG order-service/
          docker push $IMAGE_NAME:$TAG
